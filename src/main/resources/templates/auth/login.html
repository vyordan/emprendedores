<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Iniciar sesión - Chamba</title>
</head>
<body>

<div th:replace="~{layout/base :: navbar}"></div>
<hr/>

<main>
    <h2>Iniciar sesión</h2>

    <p style="color:red;" th:if="${param.error}">
        Email o contraseña incorrectos.
    </p>
    <p style="color:green;" th:if="${param.logout}">
        Sesión cerrada exitosamente.
    </p>
    <p style="color:orange;" th:if="${param.expired}">
        Tu sesión ha expirado.
    </p>

    <form th:action="@{/auth/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>
        <p>
            <label>Email:<br/>
                <input type="email" name="username"
                       placeholder="tu@email.com" required autofocus/>
            </label>
        </p>
        <p>
            <label>Contraseña:<br/>
                <input type="password" name="password" required/>
            </label>
        </p>
        <button type="submit">Iniciar sesión</button>
    </form>

    <p>¿No tienes cuenta?
        <a th:href="@{/auth/registro}">Regístrate aquí</a>
    </p>
</main>

<footer><p>Chamba &copy; 2025</p></footer>
</body>
</html>
