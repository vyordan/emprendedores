<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Iniciar sesión - Chamba</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<div id="pantalla-login" class="contenedor-pantalla activa">
    <!-- Navbar -->
    <div th:replace="~{layout/base :: navbar}"></div>

    <!-- Contenido centrado igual que el registro -->
    <main style="display:flex; justify-content:center; align-items:center; flex:1; padding:40px 20px;">
        <div class="tarjeta-formulario-horizontal-registro">
            <a th:href="@{/}" class="btn-regresar-landing">⬅ Volver a la página principal</a>

            <div class="encabezado-formulario" style="margin-bottom:25px;">
                <span class="badge-seguridad">CONEXIÓN SEGURA</span>
                <h3>Inicio de sesión</h3>
                <p>Digita las credenciales vinculadas a tu cuenta para continuar</p>
            </div>

            <!-- Mensajes de error/logout/expirado -->
            <div th:if="${param.error}" class="mensaje-flotante error" style="position:static; margin-bottom:15px;">
                Email o contraseña incorrectos.
            </div>
            <div th:if="${param.logout}" class="mensaje-flotante exito" style="position:static; margin-bottom:15px;">
                Sesión cerrada exitosamente.
            </div>
            <div th:if="${param.expired}" class="mensaje-flotante error" style="position:static; margin-bottom:15px; background:#3a2a1a; color:#fbbf24;">
                Tu sesión ha expirado.
            </div>

            <form th:action="@{/auth/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="campo-entrada">
                    <label for="username">Correo Electrónico</label>
                    <input type="email" id="username" name="username"
                           placeholder="tu@email.com" required autofocus/>
                </div>

                <div class="campo-entrada">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required/>
                </div>

                <button type="submit" class="btn-primario">VALIDAR PERFIL ➔</button>
            </form>

            <p class="texto-cambio">
                ¿No tienes cuenta? <a th:href="@{/auth/registro}">Regístrate aquí</a>
            </p>
        </div>
    </main>

    <footer class="footer-bienvenida">
        <p class="texto-copyright">Chamba © 2025 – Todos los derechos reservados.</p>
    </footer>
</div>

</body>
</html>
