<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Iniciar sesión</title></head>
<body>
<section layout:fragment="contenido">

    <h2>Iniciar sesión</h2>

    <p style="color:red;" th:if="${param.error}">
        Email o contraseña incorrectos.
    </p>
    <p style="color:green;" th:if="${param.logout}">
        Sesión cerrada exitosamente.
    </p>
    <p style="color:orange;" th:if="${param.expired}">
        Tu sesión ha expirado.
    </p>

    <form th:action="@{/auth/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>

        <p>
            <label>Email:<br/>
                <input type="email" name="username"
                       placeholder="tu@email.com" required autofocus/>
            </label>
        </p>
        <p>
            <label>Contraseña:<br/>
                <input type="password" name="password"
                       placeholder="••••••••" required/>
            </label>
        </p>
        <button type="submit">Iniciar sesión</button>
    </form>

    <p>¿No tienes cuenta?
        <a th:href="@{/auth/registro}">Regístrate aquí</a>
    </p>

</section>
</body>
</html>
