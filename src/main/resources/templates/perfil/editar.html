<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Editar perfil - Chamba</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<div id="pantalla-editar-perfil" class="contenedor-pantalla activa">
    <!-- Navbar -->
    <div th:replace="~{layout/base :: navbar}"></div>

    <!-- Mensajes flotantes -->
    <div th:if="${exito != null}" class="mensaje-flotante exito" th:text="${exito}"></div>
    <div th:if="${error != null}" class="mensaje-flotante error" th:text="${error}"></div>

    <main style="display:flex; justify-content:center; align-items:flex-start; flex:1; padding:40px 20px; gap:30px; flex-wrap:wrap;">
        
        <!-- Columna izquierda: Foto y cambio de contraseña -->
        <div style="flex:1; min-width:280px; max-width:400px; display:flex; flex-direction:column; gap:25px;">
            
            <!-- Foto de perfil actual -->
            <div class="dashboard-seccion" style="text-align:center;">
                <h3>Foto de perfil</h3>
                <div th:if="${usuarioActual.fotoPerfil != null}" class="contenedor-foto-perfil" style="margin-bottom:0;">
                    <div class="circulo-foto" th:style="'background-image:url(' + @{/imagenes/perfil/{id}(id=${usuarioActual.id})} + ');'"></div>
                </div>
                <div th:unless="${usuarioActual.fotoPerfil != null}" class="contenedor-foto-perfil" style="margin-bottom:0;">
                    <div class="circulo-foto">?</div>
                </div>
                <p style="font-size:12px; color:#a0aec0; margin-top:8px;">La foto se actualiza en la seccion de abajo.</p>
            </div>

            <!-- Cambiar contraseña -->
            <div class="dashboard-seccion">
                <h3>Cambiar contrasena</h3>
                <form th:action="@{/perfil/cambiar-password}" method="post" id="formPassword">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="campo-entrada">
                        <label>Contrasena actual</label>
                        <input type="password" name="passwordActual" required/>
                    </div>
                    <div class="campo-entrada">
                        <label>Nueva contrasena</label>
                        <input type="password" name="passwordNueva" id="pwNueva" minlength="8" required/>
                    </div>
                    <div class="campo-entrada">
                        <label>Confirmar nueva contrasena</label>
                        <input type="password" name="confirmarPassword" id="pwConfirmar" minlength="8" required/>
                    </div>
                    <button type="submit" class="btn-primario">Actualizar contrasena</button>
                </form>
            </div>

            <!-- Documentos de verificacion (solo trabajadores) -->
            <div th:if="${usuarioActual.rol.name() == 'TRABAJADOR'}" class="dashboard-seccion">
                <h3>Documentos de verificacion</h3>
                <p style="margin-bottom:12px;">Estado: <strong th:text="${perfil?.estadoVerificacion}"></strong></p>
                <form th:action="@{/perfil/documentos}" method="post" enctype="multipart/form-data">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="campo-entrada">
                        <label>DPI - Frente</label>
                        <input type="file" name="dpiFrente" accept="image/*"/>
                    </div>
                    <div class="campo-entrada">
                        <label>DPI - Reverso</label>
                        <input type="file" name="dpiReverso" accept="image/*"/>
                    </div>
                    <div class="campo-entrada">
                        <label>Selfie de verificacion</label>
                        <input type="file" name="selfie" accept="image/*"/>
                    </div>
                    <button type="submit" class="btn-primario">Actualizar documentos</button>
                </form>
            </div>
        </div>

        <!-- Columna derecha: Informacion personal -->
        <div style="flex:2; min-width:400px; max-width:600px;">
            <div class="tarjeta-formulario-horizontal-registro" style="max-width:100%;">
                <h2>Editar perfil</h2>
                <p class="subtitulo">Modifica tu informacion personal y profesional</p>

                <form th:action="@{/perfil/editar}" method="post" enctype="multipart/form-data">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="fila-campos">
                        <div class="campo-entrada">
                            <label>Nombre</label>
                            <input type="text" name="nombre" th:value="${perfil?.nombre}" required/>
                        </div>
                        <div class="campo-entrada">
                            <label>Apellido</label>
                            <input type="text" name="apellido" th:value="${perfil?.apellido}" required/>
                        </div>
                    </div>

                    <div class="campo-entrada">
                        <label>Telefono</label>
                        <input type="tel" name="telefono" th:value="${perfil?.telefono}"/>
                    </div>

                    <div class="campo-entrada">
                        <label>Descripcion</label>
                        <textarea name="descripcion" rows="3" th:text="${perfil?.descripcion}" placeholder="Cuentanos sobre ti..."></textarea>
                    </div>

                    <div th:if="${usuarioActual.rol.name() == 'TRABAJADOR'}" class="campo-entrada">
                        <label>Habilidades</label>
                        <input type="text" name="habilidades" th:value="${perfil?.habilidades}" placeholder="Ej: Fontaneria, pintura, electricidad..."/>
                    </div>

                    <div class="campo-entrada">
                        <label>Cambiar foto de perfil</label>
                        <input type="file" name="fotoPerfil" accept="image/*"/>
                    </div>

                    <button type="submit" class="btn-primario">Guardar cambios</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer-bienvenida">
        <p class="texto-copyright">NODUM &copy; 2026 - Todos los derechos reservados..</p>
    </footer>
</div>

<script>
    document.getElementById('formPassword').addEventListener('submit', e => {
        const p1 = document.getElementById('pwNueva').value;
        const p2 = document.getElementById('pwConfirmar').value;
        if (p1 !== p2) {
            e.preventDefault();
            alert('Las contrasenas no coinciden.');
        }
    });
</script>
</body>
</html>
