<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Editar perfil</title></head>
<body>
<section layout:fragment="contenido">

    <h2>Editar perfil</h2>

    <!-- Foto actual -->
    <div th:if="${usuarioActual.fotoPerfil != null}">
        <img th:src="@{/imagenes/perfil/{id}(id=${usuarioActual.id})}"
             width="80" height="80"
             style="border-radius:50%; object-fit:cover;" alt="Foto actual"/>
    </div>

    <!-- Datos personales -->
    <h3>Información personal</h3>
    <form th:action="@{/perfil/editar}" method="post"
          enctype="multipart/form-data">
        <input type="hidden" th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>

        <p>
            <label>Nombre:<br/>
                <input type="text" name="nombre"
                       th:value="${perfil?.nombre}" required/>
            </label>
        </p>
        <p>
            <label>Apellido:<br/>
                <input type="text" name="apellido"
                       th:value="${perfil?.apellido}" required/>
            </label>
        </p>
        <p>
            <label>Teléfono:<br/>
                <input type="tel" name="telefono"
                       th:value="${perfil?.telefono}"/>
            </label>
        </p>
        <p>
            <label>Descripción:<br/>
                <textarea name="descripcion" rows="3" cols="40"
                          th:text="${perfil?.descripcion}"></textarea>
            </label>
        </p>
        <p th:if="${usuarioActual.rol.name() == 'TRABAJADOR'}">
            <label>Habilidades:<br/>
                <input type="text" name="habilidades" size="40"
                       th:value="${perfil?.habilidades}"
                       placeholder="Separa con comas"/>
            </label>
        </p>
        <p>
            <label>Cambiar foto de perfil:<br/>
                <input type="file" name="fotoPerfil" accept="image/*"/>
            </label>
        </p>
        <button type="submit">Guardar cambios</button>
    </form>

    <hr/>

    <!-- Cambiar contraseña -->
    <h3>Cambiar contraseña</h3>
    <form th:action="@{/perfil/cambiar-password}" method="post"
          id="formPassword">
        <input type="hidden" th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>
        <p>
            <label>Contraseña actual:<br/>
                <input type="password" name="passwordActual" required/>
            </label>
        </p>
        <p>
            <label>Nueva contraseña:<br/>
                <input type="password" name="passwordNueva"
                       id="pwNueva" minlength="8" required/>
            </label>
        </p>
        <p>
            <label>Confirmar contraseña:<br/>
                <input type="password" name="confirmarPassword"
                       id="pwConfirmar" minlength="8" required/>
            </label>
        </p>
        <button type="submit">Actualizar contraseña</button>
    </form>

    <!-- Documentos trabajador -->
    <div th:if="${usuarioActual.rol.name() == 'TRABAJADOR'}">
        <hr/>
        <h3>Documentos de verificación</h3>
        <p>Estado actual:
            <strong th:text="${perfil?.estadoVerificacion}"></strong>
        </p>
        <form th:action="@{/perfil/documentos}" method="post"
              enctype="multipart/form-data">
            <input type="hidden" th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>
            <p>
                <label>DPI — Frente:<br/>
                    <input type="file" name="dpiFrente" accept="image/*"/>
                </label>
            </p>
            <p>
                <label>DPI — Reverso:<br/>
                    <input type="file" name="dpiReverso" accept="image/*"/>
                </label>
            </p>
            <p>
                <label>Selfie de verificación:<br/>
                    <input type="file" name="selfie" accept="image/*"/>
                </label>
            </p>
            <button type="submit">Actualizar documentos</button>
        </form>
    </div>

</section>

<th:block layout:fragment="scripts">
<script>
    document.getElementById('formPassword')
        .addEventListener('submit', e => {
            const p1 = document.getElementById('pwNueva').value;
            const p2 = document.getElementById('pwConfirmar').value;
            if (p1 !== p2) {
                e.preventDefault();
                alert('Las contraseñas nuevas no coinciden.');
            }
        });
</script>
</th:block>
</body>
</html>
