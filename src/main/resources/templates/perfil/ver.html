<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Perfil - Chamba</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<div id="pantalla-ver-perfil" class="contenedor-pantalla activa">
    <!-- Navbar -->
    <div th:replace="~{layout/base :: navbar}"></div>

    <!-- Mensajes flotantes -->
    <div th:if="${exito != null}" class="mensaje-flotante exito" th:text="${exito}"></div>
    <div th:if="${error != null}" class="mensaje-flotante error" th:text="${error}"></div>

    <main class="contenido-principal-interno centro-perfil-data">

        <!-- Tarjeta de perfil principal -->
        <div class="dashboard-seccion" style="width:100%; text-align:center;">
            <!-- Foto de perfil solo si existe -->
            <img th:if="${fotoSrc != null}" th:src="${fotoSrc}" alt="Foto" class="foto-perfil-img"/>

            <h2 th:if="${perfil != null}" th:text="${perfil.nombre} + ' ' + ${perfil.apellido}"></h2>
            <p class="oficio-tag" th:text="${usuario.rol}">Rol</p>
            <p style="color:#cbd5e1;">Email: <span th:text="${usuario.email}"></span></p>
            <p style="color:#94a3b8; font-size:13px;">Miembro desde: <span th:text="${#temporals.format(usuario.fechaRegistro,'MM/yyyy')}"></span></p>
            <div class="rating" style="font-size:16px; margin:10px 0;">
                <span th:text="${#numbers.formatDecimal(promedio,1,1)} + '/5'"></span>
                (<span th:text="${totalResenas}"></span> resenas)
            </div>

            <div th:if="${perfil != null}">
                <p th:if="${perfil.telefono != null}" style="color:#a0aec0;">Tel: <span th:text="${perfil.telefono}"></span></p>
                <p th:if="${perfil.descripcion != null}" th:text="${perfil.descripcion}" style="color:#cbd5e1; max-width:400px; margin:10px auto;"></p>
            </div>

            <div th:if="${usuario.rol.name() == 'TRABAJADOR' and perfil != null}">
                <p style="color:#a0aec0;">Verificacion: <strong th:text="${perfil.estadoVerificacion}"></strong></p>
                <p th:if="${perfil.habilidades != null}" style="color:#a0aec0;">Habilidades: <span th:text="${perfil.habilidades}"></span></p>
            </div>

            <div th:if="${usuarioActual != null and usuarioActual.id == usuario.id}" style="margin-top:15px;">
                <a th:href="@{/perfil/editar}" class="btn-ver-mas">Editar mi perfil</a>
            </div>
        </div>

        <!-- Trabajos publicados (si es empleador) -->
        <div th:if="${usuario.rol.name() == 'EMPLEADOR' and trabajosPublicados != null and not #lists.isEmpty(trabajosPublicados)}"
             class="dashboard-seccion" style="width:100%; text-align:left;">
            <h3>Trabajos publicados</h3>
            <ul class="lista-enlaces">
                <li th:each="t : ${trabajosPublicados}">
                    <a th:href="@{/trabajos/{id}(id=${t.id})}" th:text="${t.titulo}"></a>
                    — <span th:text="${t.estado}"></span>
                </li>
            </ul>
        </div>

        <!-- Resenas -->
        <div class="dashboard-seccion" style="width:100%; text-align:left;">
            <h3>Resenas</h3>
            <p th:if="${#lists.isEmpty(resenas)}" class="mensaje-vacio">Sin resenas aun.</p>
            <div th:each="r : ${resenas}" class="tarjeta-resena">
                <p>
                    <strong th:text="${r.autor.email}"></strong>
                    <span style="color:#ff9800;"> - <span th:text="${r.puntuacion} + '/5'"></span></span>
                    <small style="color:#64748b;"> - <span th:text="${#temporals.format(r.fecha,'dd/MM/yyyy')}"></span></small>
                </p>
                <p th:if="${r.comentario != null}" th:text="${r.comentario}" style="color:#cbd5e1;"></p>
            </div>
        </div>

        <!-- Reportar usuario (si no es el mismo usuario) -->
        <div th:if="${usuarioActual != null and usuarioActual.id != usuario.id}"
             class="dashboard-seccion" style="width:100%; text-align:left;">
            <h3>Reportar usuario</h3>
            <form th:action="@{/reportes/crear}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="reportadoId" th:value="${usuario.id}"/>

                <div class="campo-entrada">
                    <label>Motivo</label>
                    <select name="motivo" required>
                        <option value="">Selecciona...</option>
                        <option value="Comportamiento inapropiado">Comportamiento inapropiado</option>
                        <option value="Informacion falsa">Informacion falsa</option>
                        <option value="Estafa o fraude">Estafa o fraude</option>
                        <option value="Spam">Spam</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>
                <div class="campo-entrada">
                    <label>Descripcion</label>
                    <textarea name="descripcion" rows="3" placeholder="Detalla el motivo..."></textarea>
                </div>
                <button type="submit" class="btn-primario" style="background:#b91c1c;">Reportar</button>
            </form>
        </div>
    </main>

    <footer class="footer-bienvenida">
        <p class="texto-copyright">NODUM &copy; 2026 - Todos los derechos reservados..</p>
    </footer>
</div>

</body>
</html>
