<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Perfil - Chamba</title>
</head>
<body>

<div th:replace="~{layout/base :: navbar}"></div>
<hr/>

<div th:if="${exito != null}">
    <p style="color:green;" th:text="${exito}"></p>
</div>
<div th:if="${error != null}">
    <p style="color:red;" th:text="${error}"></p>
</div>

<main>
    <h2>Perfil</h2>

    <img th:if="${fotoSrc != null}" th:src="${fotoSrc}"
         width="100" height="100"
         style="border-radius:50%;object-fit:cover;" alt="Foto"/>

    <h3 th:if="${perfil != null}"
        th:text="${perfil.nombre} + ' ' + ${perfil.apellido}"></h3>

    <p>Email: <span th:text="${usuario.email}"></span></p>
    <p>Rol: <strong th:text="${usuario.rol}"></strong></p>
    <p>Miembro desde:
        <span th:text="${#temporals.format(usuario.fechaRegistro,'MM/yyyy')}">
        </span>
    </p>

    <div th:if="${perfil != null}">
        <p th:if="${perfil.telefono != null}"
           th:text="'Tel: ' + ${perfil.telefono}"></p>
        <p th:if="${perfil.descripcion != null}"
           th:text="${perfil.descripcion}"></p>
    </div>

    <div th:if="${usuario.rol.name() == 'TRABAJADOR' and perfil != null}">
        <p>Verificación:
            <strong th:text="${perfil.estadoVerificacion}"></strong>
        </p>
        <p th:if="${perfil.habilidades != null}"
           th:text="'Habilidades: ' + ${perfil.habilidades}"></p>
    </div>

    <p>Puntuación:
        <strong th:text="${#numbers.formatDecimal(promedio,1,1)} + '/5'"></strong>
        (<span th:text="${totalResenas}"></span> reseñas)
    </p>

    <div th:if="${usuarioActual != null and usuarioActual.id == usuario.id}">
        <p><a th:href="@{/perfil/editar}">Editar mi perfil</a></p>
    </div>

    <div th:if="${usuario.rol.name() == 'EMPLEADOR' and
                 trabajosPublicados != null and
                 not #lists.isEmpty(trabajosPublicados)}">
        <hr/>
        <h3>Trabajos publicados</h3>
        <ul>
            <li th:each="t : ${trabajosPublicados}">
                <a th:href="@{/trabajos/{id}(id=${t.id})}"
                   th:text="${t.titulo}"></a>
                — <span th:text="${t.estado}"></span>
            </li>
        </ul>
    </div>

    <hr/>
    <h3>Reseñas</h3>
    <p th:if="${#lists.isEmpty(resenas)}">Sin reseñas.</p>
    <div th:each="r : ${resenas}">
        <p>
            <strong th:text="${r.autor.email}"></strong> —
            <span th:text="${r.puntuacion} + '/5'"></span> —
            <span th:text="${#temporals.format(r.fecha,'dd/MM/yyyy')}"></span>
        </p>
        <p th:if="${r.comentario != null}" th:text="${r.comentario}"></p>
        <hr/>
    </div>

    <div th:if="${usuarioActual != null and usuarioActual.id != usuario.id}">
        <h3>Reportar usuario</h3>
        <form th:action="@{/reportes/crear}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>
            <input type="hidden" name="reportadoId" th:value="${usuario.id}"/>
            <label>Motivo:
                <select name="motivo" required>
                    <option value="">Selecciona...</option>
                    <option value="Comportamiento inapropiado">
                        Comportamiento inapropiado
                    </option>
                    <option value="Información falsa">Información falsa</option>
                    <option value="Estafa o fraude">Estafa o fraude</option>
                    <option value="Spam">Spam</option>
                    <option value="Otro">Otro</option>
                </select>
            </label><br/>
            <label>Descripción:<br/>
                <textarea name="descripcion" rows="2" cols="40"></textarea>
            </label><br/>
            <button type="submit">Reportar</button>
        </form>
    </div>
</main>

<footer><p>Chamba &copy; 2025</p></footer>
</body>
</html>
