<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="${perfil != null} ? ${perfil.nombre} + ' ' + ${perfil.apellido} : 'Perfil'">
        Perfil
    </title>
</head>
<body>
<section layout:fragment="contenido">
    <div class="container py-5">
        <div class="row g-4">

            <!-- Sidebar perfil -->
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body p-4 text-center">

                        <!-- Foto -->
                        <div class="mb-3">
                            <img th:if="${fotoSrc != null}"
                                 th:src="${fotoSrc}"
                                 class="rounded-circle border border-3 border-primary"
                                 width="120" height="120"
                                 style="object-fit:cover;" alt="Foto de perfil"/>
                            <i th:unless="${fotoSrc != null}"
                               class="fa-solid fa-circle-user text-muted"
                               style="font-size: 7rem;"></i>
                        </div>

                        <!-- Nombre -->
                        <h4 class="fw-bold mb-0"
                            th:if="${perfil != null}"
                            th:text="${perfil.nombre} + ' ' + ${perfil.apellido}">
                        </h4>
                        <div class="text-muted small mb-2"
                             th:text="${usuario.email}"></div>

                        <!-- Rol badge -->
                        <span class="badge mb-3"
                              th:classappend="${usuario.rol.name() == 'EMPLEADOR'} ? 'bg-primary' : 'bg-success'"
                              th:text="${usuario.rol}">
                        </span>

                        <!-- Verificación (trabajador) -->
                        <div th:if="${usuario.rol.name() == 'TRABAJADOR' and perfil != null}">
                            <span class="badge"
                                  th:classappend="${perfil.estadoVerificacion.name() == 'VERIFICADO'} ? 'bg-success' :
                                                  (${perfil.estadoVerificacion.name() == 'PENDIENTE'} ? 'bg-warning text-dark' : 'bg-danger')"
                                  th:text="${perfil.estadoVerificacion}">
                            </span>
                        </div>

                        <!-- Reputación -->
                        <div class="mt-3 pt-3 border-top">
                            <div class="d-flex justify-content-center align-items-center gap-2">
                                <i class="fa-solid fa-star text-warning fs-5"></i>
                                <span class="fw-bold fs-5"
                                      th:text="${#numbers.formatDecimal(promedio, 1, 1)}">
                                    0.0
                                </span>
                                <span class="text-muted small"
                                      th:text="'(' + ${totalResenas} + ' reseñas)'">
                                </span>
                            </div>
                        </div>

                        <!-- Teléfono -->
                        <div class="mt-2 text-muted small"
                             th:if="${perfil != null and perfil.telefono != null}">
                            <i class="fa-solid fa-phone me-1"></i>
                            <span th:text="${perfil.telefono}"></span>
                        </div>

                        <!-- Miembro desde -->
                        <div class="mt-1 text-muted small">
                            <i class="fa-solid fa-calendar me-1"></i>
                            Miembro desde
                            <span th:text="${#temporals.format(usuario.fechaRegistro, 'MM/yyyy')}">
                            </span>
                        </div>

                        <!-- Botón editar (si es mi perfil) -->
                        <div class="mt-3"
                             th:if="${usuarioActual != null and usuarioActual.id == usuario.id}">
                            <a th:href="@{/perfil/editar}"
                               class="btn btn-outline-primary btn-sm w-100">
                                <i class="fa-solid fa-pen me-2"></i>Editar perfil
                            </a>
                        </div>

                        <!-- Botón reportar (si no es mi perfil) -->
                        <div class="mt-3"
                             th:if="${usuarioActual != null and usuarioActual.id != usuario.id}">
                            <button class="btn btn-outline-danger btn-sm w-100"
                                    data-bs-toggle="modal"
                                    data-bs-target="#modalReportar">
                                <i class="fa-solid fa-flag me-2"></i>Reportar usuario
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Habilidades (trabajador) -->
                <div class="card border-0 shadow-sm mb-4"
                     th:if="${usuario.rol.name() == 'TRABAJADOR' and
                             perfil != null and perfil.habilidades != null}">
                    <div class="card-body p-4">
                        <h6 class="fw-bold mb-3">
                            <i class="fa-solid fa-wrench me-2 text-primary"></i>
                            Habilidades
                        </h6>
                        <div class="d-flex flex-wrap gap-2">
                            <span th:each="habilidad : ${#strings.arraySplit(perfil.habilidades, ',')}"
                                  class="badge bg-primary bg-opacity-10
                                         text-primary rounded-pill px-3 py-2"
                                  th:text="${#strings.trim(habilidad)}">
                            </span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Contenido principal -->
            <div class="col-lg-8">

                <!-- Descripción -->
                <div class="card border-0 shadow-sm mb-4"
                     th:if="${perfil != null and perfil.descripcion != null}">
                    <div class="card-body p-4">
                        <h6 class="fw-bold mb-3">
                            <i class="fa-solid fa-user me-2 text-primary"></i>
                            Sobre mí
                        </h6>
                        <p class="mb-0 text-muted"
                           style="white-space: pre-line;"
                           th:text="${perfil.descripcion}"></p>
                    </div>
                </div>

                <!-- Trabajos publicados (empleador) -->
                <div class="card border-0 shadow-sm mb-4"
                     th:if="${usuario.rol.name() == 'EMPLEADOR' and
                             trabajosPublicados != null and
                             not #lists.isEmpty(trabajosPublicados)}">
                    <div class="card-header bg-white border-0 pt-3 fw-bold">
                        <i class="fa-solid fa-briefcase me-2 text-primary"></i>
                        Trabajos publicados
                        <span class="badge bg-primary rounded-pill ms-2"
                              th:text="${#lists.size(trabajosPublicados)}"></span>
                    </div>
                    <div class="list-group list-group-flush">
                        <a th:each="trabajo : ${trabajosPublicados}"
                           th:href="@{/trabajos/{id}(id=${trabajo.id})}"
                           class="list-group-item list-group-item-action py-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <div class="fw-semibold"
                                         th:text="${trabajo.titulo}"></div>
                                    <div class="text-muted small"
                                         th:text="${#temporals.format(trabajo.fechaCreacion, 'dd/MM/yyyy')}">
                                    </div>
                                </div>
                                <div class="d-flex align-items-center gap-2">
                                    <span class="fw-bold text-primary small"
                                          th:text="'Q' + ${#numbers.formatDecimal(trabajo.presupuesto, 1, 2)}">
                                    </span>
                                    <span class="badge"
                                          th:classappend="${trabajo.estado.name() == 'ABIERTO'} ? 'bg-success' :
                                                          (${trabajo.estado.name() == 'EN_PROGRESO'} ? 'bg-warning text-dark' : 'bg-secondary')"
                                          th:text="${trabajo.estado}">
                                    </span>
                                </div>
                            </div>
                        </a>
                    </div>
                </div>

                <!-- Reseñas -->
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white border-0 pt-3 fw-bold">
                        <i class="fa-solid fa-star me-2 text-warning"></i>
                        Reseñas
                        <span class="badge bg-warning text-dark rounded-pill ms-2"
                              th:text="${totalResenas}"></span>
                    </div>

                    <div class="card-body text-center py-5"
                         th:if="${#lists.isEmpty(resenas)}">
                        <i class="fa-solid fa-star fa-2x text-muted mb-2 d-block opacity-50"></i>
                        <p class="text-muted small mb-0">
                            Aún no hay reseñas para este usuario.
                        </p>
                    </div>

                    <div class="list-group list-group-flush"
                         th:unless="${#lists.isEmpty(resenas)}">
                        <div class="list-group-item py-3"
                             th:each="resena : ${resenas}">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <div class="d-flex align-items-center gap-2">
                                    <img th:if="${resena.autor.fotoPerfil != null}"
                                         th:src="@{/imagenes/perfil/{id}(id=${resena.autor.id})}"
                                         class="rounded-circle" width="36" height="36"
                                         style="object-fit:cover;" alt=""/>
                                    <i th:unless="${resena.autor.fotoPerfil != null}"
                                       class="fa-solid fa-circle-user fa-2x text-muted"></i>
                                    <div>
                                        <div class="fw-semibold small"
                                             th:text="${resena.autor.email}"></div>
                                        <div class="text-muted"
                                             style="font-size: 0.75rem;"
                                             th:text="${#temporals.format(resena.fecha, 'dd/MM/yyyy')}">
                                        </div>
                                    </div>
                                </div>
                                <!-- Estrellas -->
                                <div>
                                    <th:block th:each="i : ${#numbers.sequence(1, 5)}">
                                        <i class="fa-star"
                                           th:classappend="${i <= resena.puntuacion} ? 'fa-solid text-warning' : 'fa-regular text-muted'">
                                        </i>
                                    </th:block>
                                </div>
                            </div>
                            <p class="text-muted small mb-0"
                               th:if="${resena.comentario != null}"
                               th:text="${resena.comentario}"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Modal reportar -->
<th:block layout:fragment="scripts">
<div class="modal fade" id="modalReportar" tabindex="-1" aria-hidden="true"
     th:if="${usuarioActual != null and usuarioActual.id != usuario.id}">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">
                    <i class="fa-solid fa-flag me-2 text-danger"></i>
                    Reportar usuario
                </h5>
                <button type="button" class="btn-close"
                        data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/reportes/crear}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>
                <input type="hidden" name="reportadoId"
                       th:value="${usuario.id}"/>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Motivo</label>
                        <select name="motivo" class="form-select" required>
                            <option value="">Selecciona un motivo</option>
                            <option value="Comportamiento inapropiado">
                                Comportamiento inapropiado
                            </option>
                            <option value="Información falsa">
                                Información falsa
                            </option>
                            <option value="Estafa o fraude">
                                Estafa o fraude
                            </option>
                            <option value="Spam">Spam</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            Descripción
                            <span class="text-muted fw-normal">(opcional)</span>
                        </label>
                        <textarea name="descripcion" class="form-control"
                                  rows="3"
                                  placeholder="Describe brevemente el problema...">
                        </textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary"
                            data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-danger fw-semibold">
                        <i class="fa-solid fa-flag me-2"></i>Enviar reporte
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
</th:block>
</body>
</html>
