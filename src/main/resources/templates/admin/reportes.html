<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Admin — Reportes</title></head>
<body>
<section layout:fragment="contenido">
    <div class="container py-5">

        <div class="d-flex align-items-center gap-3 mb-4">
            <a th:href="@{/admin}" class="btn btn-outline-secondary btn-sm">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <div>
                <h2 class="fw-bold mb-0">Reportes</h2>
                <p class="text-muted small mb-0">
                    <span th:text="${#lists.size(reportes)}"></span> reportes en total
                </p>
            </div>
        </div>

        <div class="text-center py-5 card border-0 shadow-sm"
             th:if="${#lists.isEmpty(reportes)}">
            <i class="fa-solid fa-flag fa-3x text-muted mb-3 d-block"></i>
            <h5 class="text-muted">No hay reportes registrados</h5>
        </div>

        <div class="card border-0 shadow-sm"
             th:unless="${#lists.isEmpty(reportes)}">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Reportante</th>
                            <th>Reportado</th>
                            <th>Motivo</th>
                            <th>Estado</th>
                            <th>Fecha</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="reporte : ${reportes}">
                            <td>
                                <a th:href="@{/perfil/{id}(id=${reporte.reportante.id})}"
                                   class="text-decoration-none small"
                                   th:text="${reporte.reportante.email}"></a>
                            </td>
                            <td>
                                <a th:href="@{/perfil/{id}(id=${reporte.reportado.id})}"
                                   class="text-decoration-none small fw-semibold"
                                   th:text="${reporte.reportado.email}"></a>
                            </td>
                            <td class="small" th:text="${reporte.motivo}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${reporte.estado.name() == 'PENDIENTE'} ? 'bg-warning text-dark' :
                                                      (${reporte.estado.name() == 'REVISADO'} ? 'bg-info' : 'bg-secondary')"
                                      th:text="${reporte.estado}">
                                </span>
                            </td>
                            <td class="text-muted small"
                                th:text="${#temporals.format(reporte.fecha, 'dd/MM/yyyy')}">
                            </td>
                            <td>
                                <div class="d-flex gap-1"
                                     th:if="${reporte.estado.name() == 'PENDIENTE'}">
                                    <form th:action="@{/admin/reportes/{id}/resolver(id=${reporte.id})}"
                                          method="post" class="d-inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}"
                                               th:value="${_csrf.token}"/>
                                        <input type="hidden" name="decision" value="REVISADO"/>
                                        <button type="submit"
                                                class="btn btn-info btn-sm text-white">
                                            <i class="fa-solid fa-eye me-1"></i>Revisado
                                        </button>
                                    </form>
                                    <form th:action="@{/admin/reportes/{id}/resolver(id=${reporte.id})}"
                                          method="post" class="d-inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}"
                                               th:value="${_csrf.token}"/>
                                        <input type="hidden" name="decision" value="CERRADO"/>
                                        <button type="submit"
                                                class="btn btn-secondary btn-sm">
                                            <i class="fa-solid fa-xmark me-1"></i>Cerrar
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</section>
</body>
</html>
