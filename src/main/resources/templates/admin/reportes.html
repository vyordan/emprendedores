<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Admin — Reportes</title></head>
<body>
<section layout:fragment="contenido">

    <a th:href="@{/admin}">← Admin</a>
    <h2>Reportes (<span th:text="${#lists.size(reportes)}"></span>)</h2>

    <p th:if="${#lists.isEmpty(reportes)}">No hay reportes.</p>

    <table th:unless="${#lists.isEmpty(reportes)}" border="1" cellpadding="6">
        <thead>
            <tr>
                <th>Reportante</th>
                <th>Reportado</th>
                <th>Motivo</th>
                <th>Estado</th>
                <th>Fecha</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="r : ${reportes}">
                <td th:text="${r.reportante.email}"></td>
                <td>
                    <a th:href="@{/perfil/{id}(id=${r.reportado.id})}"
                       th:text="${r.reportado.email}"></a>
                </td>
                <td th:text="${r.motivo}"></td>
                <td th:text="${r.estado}"></td>
                <td th:text="${#temporals.format(r.fecha,'dd/MM/yyyy')}"></td>
                <td>
                    <form th:if="${r.estado.name() == 'PENDIENTE'}"
                          th:action="@{/admin/reportes/{id}/resolver(id=${r.id})}"
                          method="post" style="display:inline;">
                        <input type="hidden" th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>
                        <input type="hidden" name="decision" value="REVISADO"/>
                        <button type="submit">Revisado</button>
                    </form>
                    <form th:if="${r.estado.name() == 'PENDIENTE'}"
                          th:action="@{/admin/reportes/{id}/resolver(id=${r.id})}"
                          method="post" style="display:inline;">
                        <input type="hidden" th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>
                        <input type="hidden" name="decision" value="CERRADO"/>
                        <button type="submit">Cerrar</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

</section>
</body>
</html>
