<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Verificaciones - Admin</title>
</head>
<body>

<div th:replace="~{layout/base :: navbar}"></div>
<hr/>

<div th:if="${exito != null}">
    <p style="color:green;" th:text="${exito}"></p>
</div>
<div th:if="${error != null}">
    <p style="color:red;" th:text="${error}"></p>
</div>

<main>
    <a th:href="@{/admin}">← Admin</a>
    <h2>Verificaciones pendientes</h2>
    <p th:if="${#lists.isEmpty(pendientes)}">Sin pendientes.</p>

    <div th:each="perfil : ${pendientes}">
        <h3 th:text="${perfil.nombre} + ' ' + ${perfil.apellido}"></h3>
        <p th:text="${perfil.usuario.email}"></p>
        <p>DPI: <span th:text="${perfil.dpi}"></span></p>

        <p th:if="${perfil.dpiFrente != null}">
            DPI Frente:
            <img th:src="@{/imagenes/dpi-frente/{id}(id=${perfil.id})}"
                 style="max-height:100px;" alt="DPI Frente"/>
        </p>
        <p th:if="${perfil.dpiReverso != null}">
            DPI Reverso:
            <img th:src="@{/imagenes/dpi-reverso/{id}(id=${perfil.id})}"
                 style="max-height:100px;" alt="DPI Reverso"/>
        </p>
        <p th:if="${perfil.selfieVerificacion != null}">
            Selfie:
            <img th:src="@{/imagenes/selfie/{id}(id=${perfil.id})}"
                 style="max-height:100px;" alt="Selfie"/>
        </p>

        <form th:action="@{/admin/verificaciones/{id}/resolver(id=${perfil.id})}"
              method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>
            <input type="hidden" name="decision" value="VERIFICADO"/>
            <button type="submit">Verificar</button>
        </form>
        <form th:action="@{/admin/verificaciones/{id}/resolver(id=${perfil.id})}"
              method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>
            <input type="hidden" name="decision" value="RECHAZADO"/>
            <button type="submit"
                    onclick="return confirm('¿Rechazar?')">Rechazar</button>
        </form>
        <a th:href="@{/perfil/{id}(id=${perfil.usuario.id})}">Ver perfil</a>
        <hr/>
    </div>
</main>

<footer><p>Chamba &copy; 2025</p></footer>
</body>
</html>
