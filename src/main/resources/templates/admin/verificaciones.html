<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Admin — Verificaciones</title></head>
<body>
<section layout:fragment="contenido">
    <div class="container py-5">

        <div class="d-flex align-items-center gap-3 mb-4">
            <a th:href="@{/admin}" class="btn btn-outline-secondary btn-sm">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <div>
                <h2 class="fw-bold mb-0">Verificaciones pendientes</h2>
                <p class="text-muted small mb-0">
                    Revisa los documentos de identidad de los trabajadores
                </p>
            </div>
        </div>

        <!-- Sin pendientes -->
        <div class="text-center py-5 card border-0 shadow-sm"
             th:if="${#lists.isEmpty(pendientes)}">
            <i class="fa-solid fa-circle-check fa-3x text-success mb-3 d-block"></i>
            <h5 class="text-muted">No hay verificaciones pendientes</h5>
        </div>

        <!-- Lista -->
        <div class="row g-4" th:unless="${#lists.isEmpty(pendientes)}">
            <div class="col-md-6" th:each="perfil : ${pendientes}">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">

                        <!-- Info trabajador -->
                        <div class="d-flex align-items-center gap-3 mb-3">
                            <img th:if="${perfil.usuario.fotoPerfil != null}"
                                 th:src="@{/imagenes/perfil/{id}(id=${perfil.usuario.id})}"
                                 class="rounded-circle" width="52" height="52"
                                 style="object-fit:cover;" alt=""/>
                            <i th:unless="${perfil.usuario.fotoPerfil != null}"
                               class="fa-solid fa-circle-user fa-3x text-muted"></i>
                            <div>
                                <div class="fw-bold"
                                     th:text="${perfil.nombre} + ' ' + ${perfil.apellido}">
                                </div>
                                <div class="text-muted small"
                                     th:text="${perfil.usuario.email}"></div>
                                <div class="text-muted small">
                                    DPI: <span th:text="${perfil.dpi}"></span>
                                </div>
                            </div>
                        </div>

                        <!-- Documentos -->
                        <div class="row g-2 mb-3">
                            <div class="col-4 text-center">
                                <div class="text-muted small mb-1">DPI Frente</div>
                                <img th:if="${perfil.dpiFrente != null}"
                                     th:src="@{/imagenes/dpi-frente/{id}(id=${perfil.id})}"
                                     class="img-fluid rounded border" style="max-height:80px;"
                                     alt="DPI Frente"/>
                                <span th:unless="${perfil.dpiFrente != null}"
                                      class="text-muted small">No subido</span>
                            </div>
                            <div class="col-4 text-center">
                                <div class="text-muted small mb-1">DPI Reverso</div>
                                <img th:if="${perfil.dpiReverso != null}"
                                     th:src="@{/imagenes/dpi-reverso/{id}(id=${perfil.id})}"
                                     class="img-fluid rounded border" style="max-height:80px;"
                                     alt="DPI Reverso"/>
                                <span th:unless="${perfil.dpiReverso != null}"
                                      class="text-muted small">No subido</span>
                            </div>
                            <div class="col-4 text-center">
                                <div class="text-muted small mb-1">Selfie</div>
                                <img th:if="${perfil.selfieVerificacion != null}"
                                     th:src="@{/imagenes/selfie/{id}(id=${perfil.id})}"
                                     class="img-fluid rounded border" style="max-height:80px;"
                                     alt="Selfie"/>
                                <span th:unless="${perfil.selfieVerificacion != null}"
                                      class="text-muted small">No subido</span>
                            </div>
                        </div>

                        <!-- Acciones -->
                        <div class="d-flex gap-2">
                            <form th:action="@{/admin/verificaciones/{id}/resolver(id=${perfil.id})}"
                                  method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}"/>
                                <input type="hidden" name="decision" value="VERIFICADO"/>
                                <button type="submit" class="btn btn-success btn-sm fw-semibold">
                                    <i class="fa-solid fa-check me-1"></i>Verificar
                                </button>
                            </form>
                            <form th:action="@{/admin/verificaciones/{id}/resolver(id=${perfil.id})}"
                                  method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}"/>
                                <input type="hidden" name="decision" value="RECHAZADO"/>
                                <button type="submit" class="btn btn-danger btn-sm fw-semibold"
                                        onclick="return confirm('¿Rechazar esta verificación?')">
                                    <i class="fa-solid fa-xmark me-1"></i>Rechazar
                                </button>
                            </form>
                            <a th:href="@{/perfil/{id}(id=${perfil.usuario.id})}"
                               class="btn btn-outline-secondary btn-sm">
                                <i class="fa-solid fa-user me-1"></i>Ver perfil
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
