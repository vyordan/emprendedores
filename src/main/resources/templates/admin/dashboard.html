<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Admin</title></head>
<body>
<section layout:fragment="contenido">

    <h2>Panel de administración</h2>

    <p>Usuarios registrados: <strong th:text="${totalUsuarios}"></strong></p>
    <p>Trabajos abiertos: <strong th:text="${totalTrabajos}"></strong></p>
    <p>Reportes pendientes: <strong th:text="${reportesPendientes}"></strong></p>
    <p>Verificaciones pendientes:
        <strong th:text="${verificacionesPendientes}"></strong>
    </p>

    <ul>
        <li><a th:href="@{/admin/usuarios}">Gestionar usuarios</a></li>
        <li><a th:href="@{/admin/verificaciones}">Revisar verificaciones</a></li>
        <li><a th:href="@{/admin/reportes}">Revisar reportes</a></li>
        <li><a th:href="@{/admin/trabajos}">Ver trabajos</a></li>
    </ul>

</section>
</body>
</html>
