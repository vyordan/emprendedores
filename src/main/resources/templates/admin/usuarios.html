<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Usuarios - Admin</title>
</head>
<body>

<div th:replace="~{layout/base :: navbar}"></div>
<hr/>

<div th:if="${exito != null}">
    <p style="color:green;" th:text="${exito}"></p>
</div>
<div th:if="${error != null}">
    <p style="color:red;" th:text="${error}"></p>
</div>

<main>
    <a th:href="@{/admin}">← Admin</a>
    <h2>Usuarios (<span th:text="${#lists.size(usuarios)}"></span>)</h2>

    <table border="1" cellpadding="6">
        <thead><tr>
            <th>ID</th><th>Email</th><th>Rol</th>
            <th>Estado</th><th>Registro</th><th>Acciones</th>
        </tr></thead>
        <tbody>
            <tr th:each="u : ${usuarios}">
                <td th:text="${u.id}"></td>
                <td><a th:href="@{/perfil/{id}(id=${u.id})}"
                       th:text="${u.email}"></a></td>
                <td th:text="${u.rol}"></td>
                <td th:text="${u.estado}"></td>
                <td th:text="${#temporals.format(u.fechaRegistro,'dd/MM/yyyy')}"></td>
                <td>
                    <form th:if="${u.estado.name() == 'ACTIVO' and
                                   u.rol.name() != 'ADMIN'}"
                          th:action="@{/admin/usuarios/{id}/estado(id=${u.id})}"
                          method="post" style="display:inline;">
                        <input type="hidden" th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>
                        <input type="hidden" name="estado" value="SUSPENDIDO"/>
                        <button type="submit">Suspender</button>
                    </form>
                    <form th:if="${u.estado.name() == 'SUSPENDIDO'}"
                          th:action="@{/admin/usuarios/{id}/estado(id=${u.id})}"
                          method="post" style="display:inline;">
                        <input type="hidden" th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>
                        <input type="hidden" name="estado" value="ACTIVO"/>
                        <button type="submit">Activar</button>
                    </form>
                    <form th:if="${u.estado.name() != 'BANEADO' and
                                   u.rol.name() != 'ADMIN'}"
                          th:action="@{/admin/usuarios/{id}/estado(id=${u.id})}"
                          method="post" style="display:inline;">
                        <input type="hidden" th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>
                        <input type="hidden" name="estado" value="BANEADO"/>
                        <button type="submit"
                                onclick="return confirm('¿Banear?')">
                            Banear
                        </button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</main>

<footer><p>Chamba &copy; 2025</p></footer>
</body>
</html>
