<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Admin — Trabajos</title></head>
<body>
<section layout:fragment="contenido">

    <a th:href="@{/admin}">← Admin</a>
    <h2>Trabajos abiertos (<span th:text="${#lists.size(trabajos)}"></span>)</h2>

    <table border="1" cellpadding="6">
        <thead>
            <tr>
                <th>Título</th>
                <th>Empleador</th>
                <th>Categoría</th>
                <th>Presupuesto</th>
                <th>Postulantes</th>
                <th>Fecha</th>
                <th>Ver</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="t : ${trabajos}">
                <td th:text="${t.titulo}"></td>
                <td>
                    <a th:href="@{/perfil/{id}(id=${t.empleador.id})}"
                       th:text="${t.empleador.email}"></a>
                </td>
                <td th:text="${t.categoria?.nombre}"></td>
                <td th:text="'Q' + ${#numbers.formatDecimal(t.presupuesto,1,2)}"></td>
                <td th:text="${#lists.size(t.postulaciones)}"></td>
                <td th:text="${#temporals.format(t.fechaCreacion,'dd/MM/yyyy')}"></td>
                <td>
                    <a th:href="@{/trabajos/{id}(id=${t.id})}">Ver</a>
                </td>
            </tr>
        </tbody>
    </table>

</section>
</body>
</html>
