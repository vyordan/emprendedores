<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Inicio</title>
</head>
<body>
<section layout:fragment="contenido">

    <!-- Hero -->
    <div class="bg-primary text-white py-5">
        <div class="container py-4 text-center">
            <h1 class="display-4 fw-bold mb-3">Encuentra trabajo hoy</h1>
            <p class="lead mb-4 opacity-75">
                La plataforma que conecta a guatemaltecos con oportunidades reales.
            </p>
            <form th:action="@{/trabajos}" method="get" class="row g-2 justify-content-center">
                <div class="col-md-6">
                    <input type="text" name="q" class="form-control form-control-lg"
                           placeholder="¿Qué trabajo buscas?"/>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-light btn-lg fw-semibold">
                        <i class="fa-solid fa-magnifying-glass me-2"></i>Buscar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Categorías -->
    <div class="container py-5">
        <h2 class="fw-bold mb-4">Categorías</h2>
        <div class="row g-3">
            <div class="col-6 col-md-3 col-lg-2"
                 th:each="cat : ${categorias}">
                <a th:href="@{/trabajos(categoria=${cat.id})}"
                   class="card text-center text-decoration-none h-100
                          border-0 shadow-sm p-3 hover-shadow">
                    <i class="fa-solid fa-lg mb-2 text-primary"
                       th:classappend="${cat.icono}"></i>
                    <span class="small fw-semibold text-dark"
                          th:text="${cat.nombre}">Categoría</span>
                </a>
            </div>
        </div>
    </div>

    <!-- Trabajos recientes -->
    <div class="bg-white py-5">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold mb-0">Trabajos disponibles</h2>
                <a th:href="@{/trabajos}" class="btn btn-outline-primary btn-sm">
                    Ver todos
                </a>
            </div>
            <div class="row g-4">
                <div class="col-md-6 col-lg-4"
                     th:each="trabajo, iter : ${trabajos}"
                     th:if="${iter.index < 6}">
                    <div class="card h-100 shadow-sm border-0">
                        <div class="card-body">
                            <div class="d-flex justify-content-between mb-2">
                                <span class="badge bg-success">Abierto</span>
                                <span class="text-muted small"
                                      th:text="${#temporals.format(trabajo.fechaCreacion, 'dd/MM/yyyy')}">
                                </span>
                            </div>
                            <h5 class="card-title fw-bold"
                                th:text="${trabajo.titulo}">Título</h5>
                            <p class="card-text text-muted small"
                               th:text="${#strings.abbreviate(trabajo.descripcion, 100)}">
                            </p>
                            <div class="d-flex justify-content-between align-items-center mt-3">
                                <span class="fw-bold text-primary fs-5"
                                      th:text="'Q' + ${#numbers.formatDecimal(trabajo.presupuesto, 1, 2)}">
                                </span>
                                <a th:href="@{/trabajos/{id}(id=${trabajo.id})}"
                                   class="btn btn-primary btn-sm">Ver detalle</a>
                            </div>
                        </div>
                        <div class="card-footer bg-transparent border-0 small text-muted"
                             th:if="${trabajo.categoria != null}">
                            <i class="fa-solid me-1"
                               th:classappend="${trabajo.categoria.icono}"></i>
                            <span th:text="${trabajo.categoria.nombre}"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sin trabajos -->
            <div class="text-center py-5" th:if="${#lists.isEmpty(trabajos)}">
                <i class="fa-solid fa-folder-open fa-3x text-muted mb-3"></i>
                <p class="text-muted">No hay trabajos disponibles por el momento.</p>
            </div>
        </div>
    </div>

</section>
</body>
</html>
