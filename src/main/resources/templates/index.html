<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Inicio</title></head>
<body>
<section layout:fragment="contenido">

    <h1>Encuentra trabajo hoy</h1>
    <p>La plataforma que conecta a guatemaltecos con oportunidades reales.</p>

    <form th:action="@{/trabajos}" method="get">
        <input type="text" name="q" placeholder="¿Qué trabajo buscas?"/>
        <button type="submit">Buscar</button>
    </form>

    <hr/>

    <h2>Categorías</h2>
    <ul>
        <li th:each="cat : ${categorias}">
            <a th:href="@{/trabajos(categoria=${cat.id})}"
               th:text="${cat.nombre}">Categoría</a>
        </li>
    </ul>

    <hr/>

    <h2>Trabajos disponibles</h2>

    <p th:if="${#lists.isEmpty(trabajos)}">
        No hay trabajos disponibles por el momento.
    </p>

    <div th:each="trabajo, iter : ${trabajos}" th:if="${iter.index < 6}">
        <h3 th:text="${trabajo.titulo}"></h3>
        <p th:text="${#strings.abbreviate(trabajo.descripcion, 150)}"></p>
        <p>Presupuesto:
            <strong th:text="'Q' + ${#numbers.formatDecimal(trabajo.presupuesto,1,2)}">
            </strong>
        </p>
        <p th:if="${trabajo.categoria != null}"
           th:text="'Categoría: ' + ${trabajo.categoria.nombre}"></p>
        <a th:href="@{/trabajos/{id}(id=${trabajo.id})}">Ver detalle</a>
        <hr/>
    </div>

</section>
</body>
</html>
