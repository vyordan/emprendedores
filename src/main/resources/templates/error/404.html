<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>404 - Chamba</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<div id="pantalla-error" class="contenedor-pantalla activa">
    <!-- Navbar -->
    <div th:replace="~{layout/base :: navbar}"></div>

    <main class="contenido-principal-interno" style="display:flex; justify-content:center; align-items:center; flex:1;">
        <div class="dashboard-seccion" style="text-align:center; max-width:500px;">
            <div class="mensaje-flotante error" style="position:static; font-size:16px; margin-bottom:20px;">
                404 — Pagina no encontrada
            </div>
            <p style="color:#94a3b8; margin-bottom:20px;">La pagina que buscas no existe.</p>
            <a th:href="@{/}" class="btn-nav-primario">Volver al inicio</a>
        </div>
    </main>

    <footer class="footer-bienvenida">
        <p class="texto-copyright">NODUM &copy; 2026 - Todos los derechos reservados..</p>
    </footer>
</div>

</body>
</html>
