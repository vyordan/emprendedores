<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Página no encontrada</title></head>
<body>
<section layout:fragment="contenido">
    <div class="container py-5 text-center">
        <i class="fa-solid fa-map-pin fa-5x text-warning mb-4 d-block"></i>
        <h1 class="display-1 fw-bold text-warning">404</h1>
        <h3 class="fw-bold mb-3">Página no encontrada</h3>
        <p class="text-muted mb-4">
            La página que buscas no existe o fue movida.
        </p>
        <a th:href="@{/}" class="btn btn-primary">
            <i class="fa-solid fa-house me-2"></i>Volver al inicio
        </a>
    </div>
</section>
</body>
</html>
