<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Notificaciones</title></head>
<body>
<section layout:fragment="contenido">

    <h2>Notificaciones</h2>

    <p th:if="${#lists.isEmpty(notificaciones)}">
        No tienes notificaciones.
    </p>

    <div th:each="n : ${notificaciones}">
        <p th:classappend="${!n.leida} ? 'style=font-weight:bold;' : ''">
            <span th:if="${!n.leida}">🔵 </span>
            <span th:text="${n.mensaje}"></span>
            &nbsp;—&nbsp;
            <small th:text="${#temporals.format(n.fecha,'dd/MM/yyyy HH:mm')}"></small>
            &nbsp;
            <a th:if="${n.url != null}" th:href="${n.url}">Ver</a>
        </p>
        <hr/>
    </div>

</section>
</body>
</html>
