<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title layout:title-pattern="$CONTENT_TITLE - Chamba">Chamba</title>
</head>
<body>

<nav>
    <a th:href="@{/}">Chamba</a>
    &nbsp;|&nbsp;
    <a th:href="@{/trabajos}">Buscar trabajo</a>

    <span sec:authorize="isAnonymous()">
        &nbsp;|&nbsp;
        <a th:href="@{/auth/login}">Iniciar sesión</a>
        &nbsp;|&nbsp;
        <a th:href="@{/auth/registro}">Registrarse</a>
    </span>

    <span sec:authorize="isAuthenticated()">
        &nbsp;|&nbsp;
        <a th:href="@{/dashboard}">Dashboard</a>
        &nbsp;|&nbsp;
        <a th:href="@{/billetera}">Billetera
            <span th:if="${billetera != null}"
                  th:text="'(Q' + ${#numbers.formatDecimal(billetera.saldo,1,2)} + ')'">
            </span>
        </a>
        &nbsp;|&nbsp;
        <a th:href="@{/notificaciones}">Notificaciones
            <span th:if="${notificacionesNoLeidas != null and notificacionesNoLeidas > 0}"
                  th:text="'(' + ${notificacionesNoLeidas} + ')'">
            </span>
        </a>
        &nbsp;|&nbsp;
        <a th:if="${usuarioActual != null}"
           th:href="@{/perfil/{id}(id=${usuarioActual.id})}">Mi perfil</a>
        &nbsp;|&nbsp;
        <span sec:authorize="hasRole('EMPLEADOR')">
            <a th:href="@{/trabajos/mis-trabajos}">Mis trabajos</a>
            &nbsp;|&nbsp;
            <a th:href="@{/trabajos/nuevo}">Publicar trabajo</a>
            &nbsp;|&nbsp;
        </span>
        <span sec:authorize="hasRole('TRABAJADOR')">
            <a th:href="@{/mis-postulaciones}">Mis postulaciones</a>
            &nbsp;|&nbsp;
        </span>
        <span sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/admin}">Admin</a>
            &nbsp;|&nbsp;
        </span>
        <a th:href="@{/contratos/mis-contratos}">Mis contratos</a>
        &nbsp;|&nbsp;
        <form th:action="@{/auth/logout}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>
            <button type="submit">Cerrar sesión</button>
        </form>
    </span>
</nav>

<hr/>

<div th:if="${exito != null}">
    <p style="color:green;" th:text="${exito}"></p>
</div>
<div th:if="${error != null}">
    <p style="color:red;" th:text="${error}"></p>
</div>

<main>
    <layout:fragment name="contenido"/>
</main>

<hr/>
<footer>
    <p>Chamba &copy; 2025 — Proyecto universitario</p>
</footer>

</body>
</html>
