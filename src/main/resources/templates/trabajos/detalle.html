<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${trabajo.titulo} + ' - Chamba'">Detalle</title>
</head>
<body>

<div th:replace="~{layout/base :: navbar}"></div>
<hr/>

<div th:if="${exito != null}">
    <p style="color:green;" th:text="${exito}"></p>
</div>
<div th:if="${error != null}">
    <p style="color:red;" th:text="${error}"></p>
</div>

<main>
    <a th:href="@{/trabajos}">← Volver</a>

    <h2 th:text="${trabajo.titulo}"></h2>
    <p>Estado: <strong th:text="${trabajo.estado}"></strong></p>

    <p th:if="${trabajo.categoria != null}">
        Categoría: <span th:text="${trabajo.categoria.nombre}"></span>
    </p>

    <p>Presupuesto:
        <strong th:text="'Q' + ${#numbers.formatDecimal(trabajo.presupuesto,1,2)}">
        </strong>
    </p>
    <p th:if="${trabajo.fechaLimite != null}"
       th:text="'Fecha límite: ' + ${#temporals.format(trabajo.fechaLimite,'dd/MM/yyyy')}">
    </p>
    <p>Postulantes:
        <span th:text="${#lists.size(trabajo.postulaciones)}"></span>
    </p>
    <p>Publicado:
        <span th:text="${#temporals.format(trabajo.fechaCreacion,'dd/MM/yyyy')}"></span>
    </p>

    <h3>Descripción</h3>
    <p style="white-space:pre-line;" th:text="${trabajo.descripcion}"></p>

    <h3>Publicado por</h3>
    <p>
        <a th:href="@{/perfil/{id}(id=${trabajo.empleador.id})}"
           th:text="${trabajo.empleador.email}"></a>
    </p>

    <div th:if="${usuarioActual != null and
                 trabajo.empleador.id == usuarioActual.id}">
        <hr/>
        <a th:href="@{/trabajos/editar/{id}(id=${trabajo.id})}">Editar</a>
        &nbsp;
        <a th:href="@{/trabajos/{id}/postulaciones(id=${trabajo.id})}">
            Ver postulantes
        </a>
        &nbsp;
        <form th:action="@{/trabajos/{id}/estado(id=${trabajo.id})}"
              method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>
            <input type="hidden" name="estado" value="CERRADO"/>
            <button type="submit"
                    onclick="return confirm('¿Cerrar este trabajo?')">
                Cerrar trabajo
            </button>
        </form>
    </div>

    <div sec:authorize="hasRole('TRABAJADOR')">
        <hr/>
        <h3>Postularme</h3>
        <p th:if="${yaPostulado}" style="color:green;">
            Ya te postulaste a este trabajo.
        </p>
        <form th:unless="${yaPostulado}"
              th:action="@{/trabajos/{id}/postular(id=${trabajo.id})}"
              method="post">
            <input type="hidden" th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>
            <p>
                <label>Mensaje:<br/>
                    <textarea name="mensaje" rows="4" cols="50"
                              required></textarea>
                </label>
            </p>
            <button type="submit">Enviar postulación</button>
        </form>
    </div>

    <div sec:authorize="isAnonymous()">
        <hr/>
        <p><a th:href="@{/auth/login}">Inicia sesión</a> para postularte.</p>
    </div>
</main>

<footer><p>Chamba &copy; 2025</p></footer>
</body>
</html>
