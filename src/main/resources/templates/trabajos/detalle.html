<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}">
<head><title th:text="${trabajo.titulo}">Detalle</title></head>
<body>
<section layout:fragment="contenido">
    <div class="container py-5">
        <div class="row g-4">

            <!-- Detalle principal -->
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">

                        <!-- Encabezado -->
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <div>
                                <span class="badge bg-success mb-2"
                                      th:text="${trabajo.estado}">Estado</span>
                                <span class="badge bg-light text-dark ms-2"
                                      th:if="${trabajo.categoria != null}"
                                      th:text="${trabajo.categoria.nombre}"></span>
                                <h2 class="fw-bold mb-0"
                                    th:text="${trabajo.titulo}">Título</h2>
                            </div>
                            <span class="text-muted small"
                                  th:text="${#temporals.format(trabajo.fechaCreacion, 'dd/MM/yyyy')}">
                            </span>
                        </div>

                        <hr/>

                        <!-- Descripción -->
                        <h6 class="fw-bold text-muted text-uppercase small mb-2">Descripción</h6>
                        <p class="mb-4" style="white-space: pre-line;"
                           th:text="${trabajo.descripcion}"></p>

                        <!-- Detalles -->
                        <div class="row g-3 mb-4">
                            <div class="col-sm-4">
                                <div class="bg-light rounded p-3 text-center">
                                    <i class="fa-solid fa-money-bill-wave text-success fa-lg mb-2 d-block"></i>
                                    <div class="fw-bold text-primary fs-5"
                                         th:text="'Q' + ${#numbers.formatDecimal(trabajo.presupuesto, 1, 2)}">
                                    </div>
                                    <div class="text-muted small">Presupuesto</div>
                                </div>
                            </div>
                            <div class="col-sm-4" th:if="${trabajo.fechaLimite != null}">
                                <div class="bg-light rounded p-3 text-center">
                                    <i class="fa-solid fa-calendar text-warning fa-lg mb-2 d-block"></i>
                                    <div class="fw-bold"
                                         th:text="${#temporals.format(trabajo.fechaLimite, 'dd/MM/yyyy')}">
                                    </div>
                                    <div class="text-muted small">Fecha límite</div>
                                </div>
                            </div>
                            <div class="col-sm-4">
                                <div class="bg-light rounded p-3 text-center">
                                    <i class="fa-solid fa-users text-info fa-lg mb-2 d-block"></i>
                                    <div class="fw-bold"
                                         th:text="${#lists.size(trabajo.postulaciones)}">0</div>
                                    <div class="text-muted small">Postulantes</div>
                                </div>
                            </div>
                        </div>

                        <!-- Acciones empleador dueño -->
                        <div th:if="${usuarioActual != null and trabajo.empleador.id == usuarioActual.id}">
                            <hr/>
                            <div class="d-flex gap-2 flex-wrap">
                                <a th:href="@{/trabajos/editar/{id}(id=${trabajo.id})}"
                                   class="btn btn-outline-secondary btn-sm">
                                    <i class="fa-solid fa-pen me-1"></i>Editar
                                </a>
                                <a th:href="@{/trabajos/{id}/postulaciones(id=${trabajo.id})}"
                                   class="btn btn-outline-primary btn-sm">
                                    <i class="fa-solid fa-users me-1"></i>
                                    Ver postulantes
                                </a>
                                <form th:action="@{/trabajos/{id}/estado(id=${trabajo.id})}"
                                      method="post" class="d-inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}"
                                           th:value="${_csrf.token}"/>
                                    <input type="hidden" name="estado" value="CERRADO"/>
                                    <button type="submit" class="btn btn-outline-danger btn-sm"
                                            onclick="return confirm('¿Cerrar este trabajo?')">
                                        <i class="fa-solid fa-ban me-1"></i>Cerrar trabajo
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="col-lg-4">

                <!-- Card postularse -->
                <div class="card border-0 shadow-sm mb-4"
                     sec:authorize="hasRole('TRABAJADOR')">
                    <div class="card-body p-4">
                        <h6 class="fw-bold mb-3">
                            <i class="fa-solid fa-file-signature me-2 text-primary"></i>
                            Postularme
                        </h6>

                        <!-- Ya postulado -->
                        <div th:if="${yaPostulado}"
                             class="alert alert-success mb-0 py-2 small">
                            <i class="fa-solid fa-circle-check me-2"></i>
                            Ya te postulaste a este trabajo.
                        </div>

                        <!-- Formulario postulación -->
                        <form th:unless="${yaPostulado}"
                              th:action="@{/trabajos/{id}/postular(id=${trabajo.id})}"
                              method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}"/>
                            <div class="mb-3">
                                <label class="form-label small fw-semibold">
                                    Mensaje de presentación
                                </label>
                                <textarea name="mensaje" class="form-control" rows="4"
                                          placeholder="Cuéntale al empleador por qué eres la persona ideal..."
                                          required></textarea>
                            </div>
                            <button type="submit" class="btn btn-success w-100 fw-semibold">
                                <i class="fa-solid fa-paper-plane me-2"></i>
                                Enviar postulación
                            </button>
                        </form>

                        <!-- Sin sesión -->
                        <div sec:authorize="isAnonymous()">
                            <p class="text-muted small text-center mb-2">
                                Debes iniciar sesión para postularte.
                            </p>
                            <a th:href="@{/auth/login}" class="btn btn-primary w-100">
                                Iniciar sesión
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Card empleador -->
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <h6 class="fw-bold mb-3">
                            <i class="fa-solid fa-user me-2 text-primary"></i>
                            Publicado por
                        </h6>
                        <div class="d-flex align-items-center gap-3">
                            <img th:if="${trabajo.empleador.fotoPerfil != null}"
                                 th:src="@{/imagenes/perfil/{id}(id=${trabajo.empleador.id})}"
                                 class="rounded-circle" width="48" height="48"
                                 style="object-fit:cover;" alt="Foto"/>
                            <i th:unless="${trabajo.empleador.fotoPerfil != null}"
                               class="fa-solid fa-circle-user fa-3x text-muted"></i>
                            <div>
                                <div class="fw-semibold"
                                     th:text="${trabajo.empleador.email}"></div>
                                <a th:href="@{/perfil/{id}(id=${trabajo.empleador.id})}"
                                   class="btn btn-outline-primary btn-sm mt-1">
                                    Ver perfil
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
