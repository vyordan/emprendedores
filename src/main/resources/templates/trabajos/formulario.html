<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="${trabajo != null} ? 'Editar trabajo' : 'Publicar trabajo'">
        Trabajo
    </title>
</head>
<body>
<section layout:fragment="contenido">

    <h2 th:text="${trabajo != null} ? 'Editar trabajo' : 'Publicar trabajo'"></h2>

    <form th:action="${trabajo != null}
                    ? @{/trabajos/editar/{id}(id=${trabajo.id})}
                    : @{/trabajos/nuevo}"
          method="post">
        <input type="hidden" th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>

        <p>
            <label>Título:<br/>
                <input type="text" name="titulo" size="50"
                       th:value="${trabajo?.titulo}" required maxlength="200"/>
            </label>
        </p>
        <p>
            <label>Descripción:<br/>
                <textarea name="descripcion" rows="6" cols="50"
                          required th:text="${trabajo?.descripcion}"></textarea>
            </label>
        </p>
        <p>
            <label>Presupuesto (Q):<br/>
                <input type="number" name="presupuesto" step="0.01" min="1"
                       th:value="${trabajo?.presupuesto}" required/>
            </label>
        </p>
        <p>
            <label>Fecha límite (opcional):<br/>
                <input type="date" name="fechaLimite"
                       th:value="${trabajo?.fechaLimite}"/>
            </label>
        </p>
        <p>
            <label>Categoría:<br/>
                <select name="categoriaId">
                    <option value="">Sin categoría</option>
                    <option th:each="cat : ${categorias}"
                            th:value="${cat.id}"
                            th:text="${cat.nombre}"
                            th:selected="${trabajo?.categoria?.id == cat.id}">
                    </option>
                </select>
            </label>
        </p>

        <button type="submit"
                th:text="${trabajo != null} ? 'Guardar cambios' : 'Publicar trabajo'">
        </button>
        &nbsp;
        <a th:href="@{/trabajos/mis-trabajos}">Cancelar</a>
    </form>

</section>
</body>
</html>
