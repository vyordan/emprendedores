<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${trabajo != null} ? 'Editar - Chamba' : 'Publicar - Chamba'">Trabajo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<div id="pantalla-formulario-trabajo" class="contenedor-pantalla activa">
    <!-- Navbar -->
    <div th:replace="~{layout/base :: navbar}"></div>

    <!-- Mensajes flotantes -->
    <div th:if="${exito != null}" class="mensaje-flotante exito" th:text="${exito}"></div>
    <div th:if="${error != null}" class="mensaje-flotante error" th:text="${error}"></div>

    <main style="display:flex; justify-content:center; align-items:center; flex:1; padding:40px 20px;">
        <div class="tarjeta-formulario-horizontal-registro">
            <a th:href="@{/trabajos/mis-trabajos}" class="btn-regresar-landing">⬅ Volver a mis trabajos</a>

            <h2 th:text="${trabajo != null} ? 'Editar trabajo' : 'Publicar nuevo trabajo'"></h2>
            <p class="subtitulo">Completa los campos para describir la oportunidad laboral</p>

            <form th:action="${trabajo != null}
                            ? @{/trabajos/editar/{id}(id=${trabajo.id})}
                            : @{/trabajos/nuevo}"
                  method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="campo-entrada">
                    <label>Título <span style="color:#ff5252;">*</span></label>
                    <input type="text" name="titulo" th:value="${trabajo?.titulo}" required maxlength="200"
                           placeholder="Ej: Necesito electricista para instalación"/>
                </div>
                <div class="campo-entrada">
                    <label>Descripción <span style="color:#ff5252;">*</span></label>
                    <textarea name="descripcion" rows="6" required
                              th:text="${trabajo?.descripcion}"
                              placeholder="Detalla el trabajo a realizar, requisitos, ubicación..."></textarea>
                </div>
                <div class="fila-campos">
                    <div class="campo-entrada">
                        <label>Presupuesto (Q) <span style="color:#ff5252;">*</span></label>
                        <input type="number" name="presupuesto" step="0.01" min="1"
                               th:value="${trabajo?.presupuesto}" required placeholder="0.00"/>
                    </div>
                    <div class="campo-entrada">
                        <label>Fecha límite (opcional)</label>
                        <input type="date" name="fechaLimite" th:value="${trabajo?.fechaLimite}"/>
                    </div>
                </div>
                <div class="campo-entrada">
                    <label>Categoría</label>
                    <select name="categoriaId">
                        <option value="">Sin categoría</option>
                        <option th:each="cat : ${categorias}"
                                th:value="${cat.id}"
                                th:text="${cat.nombre}"
                                th:selected="${trabajo?.categoria?.id == cat.id}">
                        </option>
                    </select>
                </div>

                <button type="submit" class="btn-primario"
                        th:text="${trabajo != null} ? 'Guardar cambios' : 'Publicar trabajo'">
                </button>
            </form>

            <p class="texto-cambio" style="margin-top:15px;">
                <a th:href="@{/trabajos/mis-trabajos}">Cancelar</a>
            </p>
        </div>
    </main>

    <footer class="footer-bienvenida">
        <p class="texto-copyright">Chamba © 2025 – Todos los derechos reservados.</p>
    </footer>
</div>

</body>
</html>
