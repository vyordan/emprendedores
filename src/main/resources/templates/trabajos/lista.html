<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Buscar trabajo - Chamba</title>
</head>
<body>

<div th:replace="~{layout/base :: navbar}"></div>
<hr/>

<div th:if="${exito != null}">
    <p style="color:green;" th:text="${exito}"></p>
</div>
<div th:if="${error != null}">
    <p style="color:red;" th:text="${error}"></p>
</div>

<main>
    <h2>Trabajos disponibles</h2>

    <form th:action="@{/trabajos}" method="get">
        <input type="text" name="q" placeholder="Buscar..."
               th:value="${q}"/>
        <button type="submit">Buscar</button>
    </form>

    <p>
        <a th:href="@{/trabajos}">Todas</a>
        <span th:each="cat : ${categorias}">
            &nbsp;|&nbsp;
            <a th:href="@{/trabajos(categoria=${cat.id})}"
               th:text="${cat.nombre}"></a>
        </span>
    </p>

    <hr/>

    <p th:if="${#lists.isEmpty(trabajos)}">No se encontraron trabajos.</p>

    <div th:each="trabajo : ${trabajos}">
        <h3 th:text="${trabajo.titulo}"></h3>
        <p th:text="${#strings.abbreviate(trabajo.descripcion, 150)}"></p>
        <p>
            Presupuesto:
            <strong th:text="'Q' + ${#numbers.formatDecimal(trabajo.presupuesto,1,2)}">
            </strong>
            &nbsp;|&nbsp;
            Estado: <span th:text="${trabajo.estado}"></span>
            &nbsp;|&nbsp;
            Postulantes:
            <span th:text="${#lists.size(trabajo.postulaciones)}"></span>
        </p>
        <a th:href="@{/trabajos/{id}(id=${trabajo.id})}">Ver detalle</a>
        <hr/>
    </div>
</main>

<footer><p>Chamba &copy; 2025</p></footer>
</body>
</html>
