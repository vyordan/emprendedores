<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Buscar trabajo</title></head>
<body>
<section layout:fragment="contenido">

    <h2>Trabajos disponibles</h2>

    <form th:action="@{/trabajos}" method="get">
        <input type="text" name="q" placeholder="Buscar..."
               th:value="${q}"/>
        <button type="submit">Buscar</button>
    </form>

    <p>Categorías:
        <a th:href="@{/trabajos}">Todas</a>
        <span th:each="cat : ${categorias}">
            &nbsp;|&nbsp;
            <a th:href="@{/trabajos(categoria=${cat.id})}"
               th:text="${cat.nombre}"></a>
        </span>
    </p>

    <hr/>

    <p th:if="${#lists.isEmpty(trabajos)}">
        No se encontraron trabajos.
        <a th:href="@{/trabajos}">Ver todos</a>
    </p>

    <div th:each="trabajo : ${trabajos}">
        <h3 th:text="${trabajo.titulo}"></h3>
        <p th:text="${#strings.abbreviate(trabajo.descripcion, 150)}"></p>
        <p>
            Presupuesto:
            <strong th:text="'Q' + ${#numbers.formatDecimal(trabajo.presupuesto,1,2)}">
            </strong>
            &nbsp;|&nbsp;
            Estado: <span th:text="${trabajo.estado}"></span>
            &nbsp;|&nbsp;
            Postulantes: <span th:text="${#lists.size(trabajo.postulaciones)}"></span>
        </p>
        <p th:if="${trabajo.categoria != null}"
           th:text="'Categoría: ' + ${trabajo.categoria.nombre}"></p>
        <a th:href="@{/trabajos/{id}(id=${trabajo.id})}">Ver detalle</a>
        <hr/>
    </div>

</section>
</body>
</html>
