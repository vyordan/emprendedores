<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Mis trabajos - Chamba</title>
</head>
<body>

<div th:replace="~{layout/base :: navbar}"></div>
<hr/>

<div th:if="${exito != null}">
    <p style="color:green;" th:text="${exito}"></p>
</div>
<div th:if="${error != null}">
    <p style="color:red;" th:text="${error}"></p>
</div>

<main>
    <h2>Mis trabajos</h2>
    <p><a th:href="@{/trabajos/nuevo}">+ Publicar nuevo</a></p>

    <p th:if="${#lists.isEmpty(trabajos)}">Sin trabajos publicados.</p>

    <div th:each="t : ${trabajos}">
        <h3 th:text="${t.titulo}"></h3>
        <p>
            Estado: <strong th:text="${t.estado}"></strong> &nbsp;|&nbsp;
            Presupuesto:
            <strong th:text="'Q' + ${#numbers.formatDecimal(t.presupuesto,1,2)}">
            </strong> &nbsp;|&nbsp;
            Postulantes:
            <span th:text="${#lists.size(t.postulaciones)}"></span>
        </p>
        <p>
            <a th:href="@{/trabajos/{id}(id=${t.id})}">Ver</a> &nbsp;
            <a th:if="${t.estado.name() == 'ABIERTO'}"
               th:href="@{/trabajos/editar/{id}(id=${t.id})}">Editar</a> &nbsp;
            <a th:href="@{/trabajos/{id}/postulaciones(id=${t.id})}">
                Postulantes
            </a> &nbsp;
            <form th:if="${t.estado.name() == 'ABIERTO'}"
                  th:action="@{/trabajos/{id}/estado(id=${t.id})}"
                  method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>
                <input type="hidden" name="estado" value="CERRADO"/>
                <button type="submit"
                        onclick="return confirm('¿Cerrar?')">Cerrar</button>
            </form>
        </p>
        <hr/>
    </div>
</main>

<footer><p>Chamba &copy; 2025</p></footer>
</body>
</html>
