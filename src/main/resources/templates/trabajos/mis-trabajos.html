<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Mis trabajos</title></head>
<body>
<section layout:fragment="contenido">
    <div class="container py-5">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-0">Mis trabajos</h2>
                <p class="text-muted small mb-0">
                    Administra tus trabajos publicados
                </p>
            </div>
            <a th:href="@{/trabajos/nuevo}" class="btn btn-primary">
                <i class="fa-solid fa-plus me-2"></i>Publicar nuevo
            </a>
        </div>

        <!-- Sin trabajos -->
        <div class="text-center py-5 card border-0 shadow-sm"
             th:if="${#lists.isEmpty(trabajos)}">
            <i class="fa-solid fa-briefcase fa-3x text-muted mb-3 d-block"></i>
            <h5 class="text-muted">Aún no has publicado trabajos</h5>
            <p class="text-muted small">
                Publica tu primer trabajo y empieza a recibir postulaciones.
            </p>
            <div>
                <a th:href="@{/trabajos/nuevo}" class="btn btn-primary">
                    Publicar trabajo
                </a>
            </div>
        </div>

        <!-- Tabla de trabajos -->
        <div class="card border-0 shadow-sm" th:unless="${#lists.isEmpty(trabajos)}">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Trabajo</th>
                            <th>Categoría</th>
                            <th>Presupuesto</th>
                            <th>Estado</th>
                            <th>Postulantes</th>
                            <th>Fecha</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="trabajo : ${trabajos}">
                            <td>
                                <div class="fw-semibold"
                                     th:text="${trabajo.titulo}"></div>
                                <div class="text-muted small"
                                     th:text="${#strings.abbreviate(trabajo.descripcion, 60)}">
                                </div>
                            </td>
                            <td>
                                <span th:if="${trabajo.categoria != null}"
                                      th:text="${trabajo.categoria.nombre}"
                                      class="badge bg-light text-dark"></span>
                                <span th:unless="${trabajo.categoria != null}"
                                      class="text-muted small">—</span>
                            </td>
                            <td class="fw-bold text-primary"
                                th:text="'Q' + ${#numbers.formatDecimal(trabajo.presupuesto, 1, 2)}">
                            </td>
                            <td>
                                <span class="badge"
                                      th:classappend="${trabajo.estado.name() == 'ABIERTO'} ? 'bg-success' :
                                                      (${trabajo.estado.name() == 'EN_PROGRESO'} ? 'bg-warning text-dark' :
                                                      (${trabajo.estado.name() == 'COMPLETADO'} ? 'bg-info' : 'bg-secondary'))"
                                      th:text="${trabajo.estado}">
                                </span>
                            </td>
                            <td class="text-center">
                                <a th:href="@{/trabajos/{id}/postulaciones(id=${trabajo.id})}"
                                   class="text-decoration-none">
                                    <span class="badge bg-primary rounded-pill"
                                          th:text="${#lists.size(trabajo.postulaciones)}">0</span>
                                </a>
                            </td>
                            <td class="text-muted small"
                                th:text="${#temporals.format(trabajo.fechaCreacion, 'dd/MM/yyyy')}">
                            </td>
                            <td>
                                <div class="d-flex gap-1">
                                    <a th:href="@{/trabajos/{id}(id=${trabajo.id})}"
                                       class="btn btn-outline-primary btn-sm"
                                       title="Ver">
                                        <i class="fa-solid fa-eye"></i>
                                    </a>
                                    <a th:if="${trabajo.estado.name() == 'ABIERTO'}"
                                       th:href="@{/trabajos/editar/{id}(id=${trabajo.id})}"
                                       class="btn btn-outline-secondary btn-sm"
                                       title="Editar">
                                        <i class="fa-solid fa-pen"></i>
                                    </a>
                                    <form th:if="${trabajo.estado.name() == 'ABIERTO'}"
                                          th:action="@{/trabajos/{id}/estado(id=${trabajo.id})}"
                                          method="post" class="d-inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}"
                                               th:value="${_csrf.token}"/>
                                        <input type="hidden" name="estado" value="CERRADO"/>
                                        <button type="submit"
                                                class="btn btn-outline-danger btn-sm"
                                                title="Cerrar"
                                                onclick="return confirm('¿Cerrar este trabajo?')">
                                            <i class="fa-solid fa-ban"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</section>
</body>
</html>
