<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Mis trabajos</title></head>
<body>
<section layout:fragment="contenido">

    <h2>Mis trabajos</h2>
    <p><a th:href="@{/trabajos/nuevo}">+ Publicar nuevo trabajo</a></p>

    <p th:if="${#lists.isEmpty(trabajos)}">
        Aún no has publicado trabajos.
    </p>

    <div th:each="trabajo : ${trabajos}">
        <h3 th:text="${trabajo.titulo}"></h3>
        <p>
            Estado: <strong th:text="${trabajo.estado}"></strong>
            &nbsp;|&nbsp;
            Presupuesto:
            <strong th:text="'Q' + ${#numbers.formatDecimal(trabajo.presupuesto,1,2)}">
            </strong>
            &nbsp;|&nbsp;
            Postulantes: <span th:text="${#lists.size(trabajo.postulaciones)}"></span>
            &nbsp;|&nbsp;
            Fecha: <span th:text="${#temporals.format(trabajo.fechaCreacion,'dd/MM/yyyy')}">
            </span>
        </p>
        <p>
            <a th:href="@{/trabajos/{id}(id=${trabajo.id})}">Ver</a>
            &nbsp;
            <a th:if="${trabajo.estado.name() == 'ABIERTO'}"
               th:href="@{/trabajos/editar/{id}(id=${trabajo.id})}">Editar</a>
            &nbsp;
            <a th:href="@{/trabajos/{id}/postulaciones(id=${trabajo.id})}">
                Ver postulantes
            </a>
            &nbsp;
            <form th:if="${trabajo.estado.name() == 'ABIERTO'}"
                  th:action="@{/trabajos/{id}/estado(id=${trabajo.id})}"
                  method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>
                <input type="hidden" name="estado" value="CERRADO"/>
                <button type="submit"
                        onclick="return confirm('¿Cerrar este trabajo?')">
                    Cerrar
                </button>
            </form>
        </p>
        <hr/>
    </div>

</section>
</body>
</html>
