<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Mis postulaciones</title></head>
<body>
<section layout:fragment="contenido">

    <h2>Mis postulaciones</h2>
    <p><a th:href="@{/trabajos}">Buscar más trabajos</a></p>

    <p th:if="${#lists.isEmpty(postulaciones)}">
        Aún no te has postulado a ningún trabajo.
    </p>

    <div th:each="p : ${postulaciones}">
        <h3 th:text="${p.trabajo.titulo}"></h3>
        <p>
            Estado postulación: <strong th:text="${p.estado}"></strong>
            &nbsp;|&nbsp;
            Presupuesto:
            <span th:text="'Q' + ${#numbers.formatDecimal(p.trabajo.presupuesto,1,2)}">
            </span>
            &nbsp;|&nbsp;
            Fecha:
            <span th:text="${#temporals.format(p.fechaPostulacion,'dd/MM/yyyy')}">
            </span>
        </p>
        <p th:if="${p.mensajePresentacion != null}"
           th:text="'Tu mensaje: ' + ${p.mensajePresentacion}"></p>
        <p>
            <a th:href="@{/trabajos/{id}(id=${p.trabajo.id})}">Ver trabajo</a>
            &nbsp;
            <a th:if="${p.contrato != null}"
               th:href="@{/contratos/{id}(id=${p.contrato.id})}">
                Ver contrato
            </a>
            &nbsp;
            <form th:if="${p.estado.name() == 'PENDIENTE'}"
                  th:action="@{/postulaciones/{id}/retirar(id=${p.id})}"
                  method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>
                <button type="submit"
                        onclick="return confirm('¿Retirar esta postulación?')">
                    Retirar
                </button>
            </form>
        </p>
        <hr/>
    </div>

</section>
</body>
</html>
