<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Mis postulaciones - Chamba</title>
</head>
<body>

<div th:replace="~{layout/base :: navbar}"></div>
<hr/>

<div th:if="${exito != null}">
    <p style="color:green;" th:text="${exito}"></p>
</div>
<div th:if="${error != null}">
    <p style="color:red;" th:text="${error}"></p>
</div>

<main>
    <h2>Mis postulaciones</h2>
    <p><a th:href="@{/trabajos}">Buscar más trabajos</a></p>

    <p th:if="${#lists.isEmpty(postulaciones)}">Sin postulaciones aún.</p>

    <div th:each="p : ${postulaciones}">
        <h3 th:text="${p.trabajo.titulo}"></h3>
        <p>
            Estado: <strong th:text="${p.estado}"></strong> &nbsp;|&nbsp;
            Presupuesto:
            <span th:text="'Q' + ${#numbers.formatDecimal(p.trabajo.presupuesto,1,2)}">
            </span> &nbsp;|&nbsp;
            Fecha:
            <span th:text="${#temporals.format(p.fechaPostulacion,'dd/MM/yyyy')}">
            </span>
        </p>
        <p>
            <a th:href="@{/trabajos/{id}(id=${p.trabajo.id})}">Ver trabajo</a>
            &nbsp;
            <a th:if="${p.contrato != null}"
               th:href="@{/contratos/{id}(id=${p.contrato.id})}">
                Ver contrato
            </a>
            &nbsp;
            <form th:if="${p.estado.name() == 'PENDIENTE'}"
                  th:action="@{/postulaciones/{id}/retirar(id=${p.id})}"
                  method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>
                <button type="submit"
                        onclick="return confirm('¿Retirar?')">Retirar</button>
            </form>
        </p>
        <hr/>
    </div>
</main>

<footer><p>Chamba &copy; 2025</p></footer>
</body>
</html>
