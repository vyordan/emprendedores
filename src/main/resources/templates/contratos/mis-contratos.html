<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Mis contratos - Chamba</title>
</head>
<body>

<div th:replace="~{layout/base :: navbar}"></div>
<hr/>

<div th:if="${exito != null}">
    <p style="color:green;" th:text="${exito}"></p>
</div>
<div th:if="${error != null}">
    <p style="color:red;" th:text="${error}"></p>
</div>

<main>
    <h2>Mis contratos</h2>
    <p th:if="${#lists.isEmpty(contratos)}">Sin contratos aún.</p>

    <div th:each="c : ${contratos}">
        <h3 th:text="'Contrato #' + ${c.id}"></h3>
        <p>
            Trabajo: <strong th:text="${c.postulacion.trabajo.titulo}"></strong>
            &nbsp;|&nbsp;
            Estado: <strong th:text="${c.estado}"></strong>
            &nbsp;|&nbsp;
            Monto:
            <span th:text="'Q' + ${#numbers.formatDecimal(c.montoAcordado,1,2)}">
            </span>
        </p>
        <p>
            Inicio:
            <span th:text="${#temporals.format(c.fechaInicio,'dd/MM/yyyy')}"></span>
        </p>
        <a th:href="@{/contratos/{id}(id=${c.id})}">Ver detalle</a>
        <hr/>
    </div>
</main>

<footer><p>Chamba &copy; 2025</p></footer>
</body>
</html>
