<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Contrato</title></head>
<body>
<section layout:fragment="contenido">

    <a th:href="@{/contratos/mis-contratos}">← Mis contratos</a>

    <h2>Contrato #<span th:text="${contrato.id}"></span></h2>
    <p>Estado: <strong th:text="${contrato.estado}"></strong></p>
    <p>Trabajo: <strong th:text="${contrato.postulacion.trabajo.titulo}"></strong></p>
    <p>Monto acordado:
        <strong th:text="'Q' + ${#numbers.formatDecimal(contrato.montoAcordado,1,2)}">
        </strong>
    </p>
    <p>Inicio:
        <span th:text="${#temporals.format(contrato.fechaInicio,'dd/MM/yyyy')}"></span>
    </p>
    <p th:if="${contrato.fechaFinEstimada != null}">
        Fecha estimada:
        <span th:text="${#temporals.format(contrato.fechaFinEstimada,'dd/MM/yyyy')}">
        </span>
    </p>
    <p>
        Empleador:
        <a th:href="@{/perfil/{id}(id=${contrato.postulacion.trabajo.empleador.id})}"
           th:text="${contrato.postulacion.trabajo.empleador.email}"></a>
        &nbsp;|&nbsp;
        Trabajador:
        <a th:href="@{/perfil/{id}(id=${contrato.postulacion.trabajador.id})}"
           th:text="${contrato.postulacion.trabajador.email}"></a>
    </p>

    <!-- Escrow -->
    <div th:if="${contrato.escrow != null}">
        <h3>Pago en custodia</h3>
        <p>
            Monto bloqueado:
            <strong th:text="'Q' + ${#numbers.formatDecimal(contrato.escrow.montoBloquedo,1,2)}">
            </strong>
            &nbsp;|&nbsp;
            Estado: <span th:text="${contrato.escrow.estado}"></span>
        </p>
    </div>

    <!-- Completar contrato (empleador) -->
    <div th:if="${contrato.estado.name() == 'ACTIVO' and
                 usuarioActual.id == contrato.postulacion.trabajo.empleador.id}">
        <hr/>
        <h3>Completar contrato</h3>
        <p>Al completar se liberará el pago al trabajador.</p>
        <form th:action="@{/contratos/{id}/completar(id=${contrato.id})}"
              method="post">
            <input type="hidden" th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>
            <button type="submit"
                    onclick="return confirm('¿Confirmas que el trabajo fue completado? Se liberará el pago.')">
                Completar y liberar pago
            </button>
        </form>
    </div>

    <!-- Reseña -->
    <div th:if="${contrato.estado.name() == 'COMPLETADO'}">
        <hr/>
        <h3>Dejar reseña</h3>
        <form th:action="@{/resenas/contratos/{id}(id=${contrato.id})}"
              method="post">
            <input type="hidden" th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>
            <p>
                <label>Puntuación (1-5):<br/>
                    <input type="number" name="puntuacion" min="1" max="5" required/>
                </label>
            </p>
            <p>
                <label>Comentario (opcional):<br/>
                    <textarea name="comentario" rows="3" cols="40"></textarea>
                </label>
            </p>
            <button type="submit">Enviar reseña</button>
        </form>
    </div>

    <!-- Chat -->
    <hr/>
    <h3>Chat del contrato</h3>

    <div style="border:1px solid #ccc; padding:10px; height:300px;
                overflow-y:auto; margin-bottom:10px;" id="chatBox">
        <p th:if="${#lists.isEmpty(mensajes)}"
           style="color:gray;">Sin mensajes aún.</p>
        <div th:each="msg : ${mensajes}">
            <p>
                <strong th:text="${msg.remitente.email}"></strong>
                <small th:text="'(' + ${#temporals.format(msg.fecha,'dd/MM HH:mm')} + ')'">
                </small>
                <br/>
                <span th:text="${msg.contenido}"></span>
            </p>
        </div>
    </div>

    <form th:if="${contrato.estado.name() != 'CANCELADO'}"
          th:action="@{/chat/{id}/enviar(id=${contrato.id})}"
          method="post" id="formChat">
        <input type="hidden" th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>
        <textarea name="contenido" rows="2" cols="40"
                  placeholder="Escribe un mensaje..." required
                  id="inputChat"></textarea>
        <button type="submit">Enviar</button>
    </form>

</section>

<th:block layout:fragment="scripts">
<script>
    const chatBox = document.getElementById('chatBox');
    if (chatBox) chatBox.scrollTop = chatBox.scrollHeight;

    const inputChat = document.getElementById('inputChat');
    if (inputChat) {
        inputChat.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('formChat').submit();
            }
        });
    }
</script>
</th:block>
</body>
</html>
