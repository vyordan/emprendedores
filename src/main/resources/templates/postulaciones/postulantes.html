<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Postulantes</title></head>
<body>
<section layout:fragment="contenido">
    <div class="container py-5">

        <!-- Encabezado -->
        <div class="mb-4">
            <a th:href="@{/trabajos/{id}(id=${trabajo.id})}"
               class="btn btn-outline-secondary btn-sm mb-3">
                <i class="fa-solid fa-arrow-left me-2"></i>Volver al trabajo
            </a>
            <h2 class="fw-bold mb-1">Postulantes</h2>
            <p class="text-muted small">
                Trabajo:
                <span class="fw-semibold text-dark"
                      th:text="${trabajo.titulo}"></span>
                &mdash;
                <span th:text="${#lists.size(postulaciones)}"></span>
                postulante(s)
            </p>
        </div>

        <!-- Sin postulantes -->
        <div class="text-center py-5 card border-0 shadow-sm"
             th:if="${#lists.isEmpty(postulaciones)}">
            <i class="fa-solid fa-users fa-3x text-muted mb-3 d-block"></i>
            <h5 class="text-muted">Nadie se ha postulado aún</h5>
            <p class="text-muted small">
                Comparte tu trabajo para recibir más postulaciones.
            </p>
        </div>

        <!-- Lista de postulantes -->
        <div class="row g-4" th:unless="${#lists.isEmpty(postulaciones)}">
            <div class="col-md-6" th:each="postulacion : ${postulaciones}">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body p-4">

                        <!-- Info trabajador -->
                        <div class="d-flex align-items-center gap-3 mb-3">
                            <img th:if="${postulacion.trabajador.fotoPerfil != null}"
                                 th:src="@{/imagenes/perfil/{id}(id=${postulacion.trabajador.id})}"
                                 class="rounded-circle" width="52" height="52"
                                 style="object-fit:cover;" alt="Foto"/>
                            <i th:unless="${postulacion.trabajador.fotoPerfil != null}"
                               class="fa-solid fa-circle-user fa-3x text-muted"></i>
                            <div>
                                <div class="fw-bold"
                                     th:text="${postulacion.trabajador.email}"></div>
                                <div class="text-muted small">
                                    <i class="fa-solid fa-calendar me-1"></i>
                                    <span th:text="${#temporals.format(postulacion.fechaPostulacion, 'dd/MM/yyyy HH:mm')}">
                                    </span>
                                </div>
                                <span class="badge mt-1"
                                      th:classappend="${postulacion.estado.name() == 'PENDIENTE'} ? 'bg-warning text-dark' :
                                                      (${postulacion.estado.name() == 'ACEPTADA'} ? 'bg-success' :
                                                      (${postulacion.estado.name() == 'RECHAZADA'} ? 'bg-danger' : 'bg-secondary'))"
                                      th:text="${postulacion.estado}">
                                </span>
                            </div>
                        </div>

                        <!-- Mensaje -->
                        <div class="bg-light rounded p-3 mb-3"
                             th:if="${postulacion.mensajePresentacion != null}">
                            <p class="small mb-0 text-muted"
                               style="white-space: pre-line;"
                               th:text="${postulacion.mensajePresentacion}"></p>
                        </div>

                        <!-- Acciones -->
                        <div class="d-flex gap-2 flex-wrap"
                             th:if="${postulacion.estado.name() == 'PENDIENTE'}">

                            <!-- Modal aceptar -->
                            <button type="button" class="btn btn-success btn-sm"
                                    data-bs-toggle="modal"
                                    th:data-bs-target="'#modalAceptar' + ${postulacion.id}">
                                <i class="fa-solid fa-check me-1"></i>Aceptar
                            </button>

                            <form th:action="@{/postulaciones/{id}/rechazar(id=${postulacion.id})}"
                                  method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-outline-danger btn-sm"
                                        onclick="return confirm('¿Rechazar esta postulación?')">
                                    <i class="fa-solid fa-xmark me-1"></i>Rechazar
                                </button>
                            </form>

                            <a th:href="@{/perfil/{id}(id=${postulacion.trabajador.id})}"
                               class="btn btn-outline-secondary btn-sm">
                                <i class="fa-solid fa-user me-1"></i>Ver perfil
                            </a>
                        </div>

                        <!-- Si ya fue aceptado -->
                        <div th:if="${postulacion.estado.name() == 'ACEPTADA' and postulacion.contrato != null}">
                            <a th:href="@{/contratos/{id}(id=${postulacion.contrato.id})}"
                               class="btn btn-primary btn-sm">
                                <i class="fa-solid fa-handshake me-1"></i>Ver contrato
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Modales de aceptar postulación -->
<th:block layout:fragment="scripts">
<th:block th:each="postulacion : ${postulaciones}"
          th:if="${postulacion.estado.name() == 'PENDIENTE'}">
<div class="modal fade" th:id="'modalAceptar' + ${postulacion.id}"
     tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">
                    <i class="fa-solid fa-handshake me-2 text-success"></i>
                    Aceptar postulante
                </h5>
                <button type="button" class="btn-close"
                        data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/contratos/aceptar/{id}(id=${postulacion.id})}"
                  method="post">
                <input type="hidden" th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>
                <div class="modal-body">
                    <p class="text-muted small mb-3">
                        Al aceptar se creará un contrato y se bloqueará
                        el monto en tu billetera como garantía.
                    </p>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            Monto acordado (Q)
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">Q</span>
                            <input type="number" name="montoAcordado"
                                   class="form-control" step="0.01" min="1"
                                   th:value="${trabajo.presupuesto}" required/>
                        </div>
                        <div class="form-text">
                            Tu saldo actual:
                            <strong th:if="${billetera != null}"
                                    th:text="'Q' + ${#numbers.formatDecimal(billetera.saldo, 1, 2)}">
                            </strong>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            Fecha estimada de finalización
                            <span class="text-muted fw-normal">(opcional)</span>
                        </label>
                        <input type="date" name="fechaFinEstimada" class="form-control"/>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary"
                            data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-success fw-semibold">
                        <i class="fa-solid fa-check me-2"></i>Confirmar y crear contrato
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
</th:block>
</th:block>
</body>
</html>
