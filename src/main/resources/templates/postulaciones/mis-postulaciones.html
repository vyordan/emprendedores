<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Mis postulaciones</title></head>
<body>
<section layout:fragment="contenido">
    <div class="container py-5">

        <div class="mb-4">
            <h2 class="fw-bold mb-0">Mis postulaciones</h2>
            <p class="text-muted small mb-0">
                Seguimiento de todos los trabajos a los que te has postulado
            </p>
        </div>

        <!-- Sin postulaciones -->
        <div class="text-center py-5 card border-0 shadow-sm"
             th:if="${#lists.isEmpty(postulaciones)}">
            <i class="fa-solid fa-file-lines fa-3x text-muted mb-3 d-block"></i>
            <h5 class="text-muted">Aún no te has postulado a ningún trabajo</h5>
            <p class="text-muted small">
                Explora los trabajos disponibles y postúlate.
            </p>
            <div>
                <a th:href="@{/trabajos}" class="btn btn-primary">
                    <i class="fa-solid fa-magnifying-glass me-2"></i>Buscar trabajo
                </a>
            </div>
        </div>

        <!-- Lista de postulaciones -->
        <div class="row g-3" th:unless="${#lists.isEmpty(postulaciones)}">
            <div class="col-12" th:each="postulacion : ${postulaciones}">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <div class="row align-items-center">

                            <!-- Info trabajo -->
                            <div class="col-md-6">
                                <div class="d-flex align-items-start gap-3">
                                    <div class="bg-primary bg-opacity-10 rounded p-2">
                                        <i class="fa-solid fa-briefcase text-primary fa-lg"></i>
                                    </div>
                                    <div>
                                        <h6 class="fw-bold mb-1">
                                            <a th:href="@{/trabajos/{id}(id=${postulacion.trabajo.id})}"
                                               class="text-decoration-none text-dark"
                                               th:text="${postulacion.trabajo.titulo}">
                                            </a>
                                        </h6>
                                        <div class="text-muted small mb-1">
                                            <i class="fa-solid fa-money-bill-wave me-1 text-success"></i>
                                            <span th:text="'Q' + ${#numbers.formatDecimal(postulacion.trabajo.presupuesto, 1, 2)}">
                                            </span>
                                        </div>
                                        <div class="text-muted small">
                                            <i class="fa-solid fa-calendar me-1"></i>
                                            Postulado el
                                            <span th:text="${#temporals.format(postulacion.fechaPostulacion, 'dd/MM/yyyy')}">
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Estado -->
                            <div class="col-md-3 mt-3 mt-md-0">
                                <span class="badge fs-6 px-3 py-2"
                                      th:classappend="${postulacion.estado.name() == 'PENDIENTE'} ? 'bg-warning text-dark' :
                                                      (${postulacion.estado.name() == 'ACEPTADA'} ? 'bg-success' :
                                                      (${postulacion.estado.name() == 'RECHAZADA'} ? 'bg-danger' : 'bg-secondary'))"
                                      th:text="${postulacion.estado}">
                                </span>

                                <!-- Tiene contrato -->
                                <div th:if="${postulacion.contrato != null}" class="mt-2">
                                    <a th:href="@{/contratos/{id}(id=${postulacion.contrato.id})}"
                                       class="btn btn-sm btn-outline-primary">
                                        <i class="fa-solid fa-handshake me-1"></i>
                                        Ver contrato
                                    </a>
                                </div>
                            </div>

                            <!-- Acciones -->
                            <div class="col-md-3 mt-3 mt-md-0 text-md-end">
                                <div class="d-flex gap-2 justify-content-md-end">
                                    <a th:href="@{/trabajos/{id}(id=${postulacion.trabajo.id})}"
                                       class="btn btn-outline-secondary btn-sm">
                                        <i class="fa-solid fa-eye me-1"></i>Ver trabajo
                                    </a>
                                    <form th:if="${postulacion.estado.name() == 'PENDIENTE'}"
                                          th:action="@{/postulaciones/{id}/retirar(id=${postulacion.id})}"
                                          method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}"
                                               th:value="${_csrf.token}"/>
                                        <button type="submit"
                                                class="btn btn-outline-danger btn-sm"
                                                onclick="return confirm('¿Retirar esta postulación?')">
                                            <i class="fa-solid fa-xmark me-1"></i>Retirar
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>

                        <!-- Mensaje de presentación -->
                        <div class="mt-3 pt-3 border-top" th:if="${postulacion.mensajePresentacion != null}">
                            <p class="text-muted small mb-0">
                                <i class="fa-solid fa-quote-left me-2 opacity-50"></i>
                                <span th:text="${postulacion.mensajePresentacion}"></span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
