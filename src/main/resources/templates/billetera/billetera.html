<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Mi billetera</title></head>
<body>
<section layout:fragment="contenido">
    <div class="container py-5">

        <div class="mb-4">
            <h2 class="fw-bold mb-0">Mi billetera</h2>
            <p class="text-muted small mb-0">
                Administra tu saldo y movimientos
            </p>
        </div>

        <div class="row g-4">

            <!-- Columna izquierda -->
            <div class="col-lg-4">

                <!-- Saldo -->
                <div class="card border-0 shadow-sm mb-4 bg-primary text-white">
                    <div class="card-body p-4 text-center">
                        <i class="fa-solid fa-wallet fa-3x mb-3 opacity-75"></i>
                        <div class="text-white-50 small mb-1">Saldo disponible</div>
                        <div class="display-5 fw-bold"
                             th:text="'Q' + ${#numbers.formatDecimal(billetera.saldo, 1, 2)}">
                        </div>
                    </div>
                </div>

                <!-- Depositar -->
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body p-4">
                        <h6 class="fw-bold mb-3">
                            <i class="fa-solid fa-arrow-down me-2 text-success"></i>
                            Depositar
                        </h6>
                        <form th:action="@{/billetera/depositar}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}"/>
                            <div class="mb-3">
                                <label class="form-label small fw-semibold">
                                    Monto a depositar
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text">Q</span>
                                    <input type="number" name="monto"
                                           class="form-control" placeholder="0.00"
                                           step="0.01" min="1" required/>
                                </div>
                            </div>
                            <button type="submit"
                                    class="btn btn-success w-100 fw-semibold">
                                <i class="fa-solid fa-plus me-2"></i>Depositar
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Retirar -->
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <h6 class="fw-bold mb-3">
                            <i class="fa-solid fa-arrow-up me-2 text-danger"></i>
                            Retirar
                        </h6>
                        <form th:action="@{/billetera/retirar}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}"/>
                            <div class="mb-3">
                                <label class="form-label small fw-semibold">
                                    Monto a retirar
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text">Q</span>
                                    <input type="number" name="monto"
                                           class="form-control" placeholder="0.00"
                                           step="0.01" min="1"
                                           th:max="${billetera.saldo}" required/>
                                </div>
                                <div class="form-text">
                                    Máximo disponible:
                                    <strong th:text="'Q' + ${#numbers.formatDecimal(billetera.saldo, 1, 2)}">
                                    </strong>
                                </div>
                            </div>
                            <button type="submit"
                                    class="btn btn-danger w-100 fw-semibold">
                                <i class="fa-solid fa-minus me-2"></i>Retirar
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Historial de transacciones -->
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white border-0 pt-3 fw-bold">
                        <i class="fa-solid fa-clock-rotate-left me-2 text-primary"></i>
                        Historial de movimientos
                    </div>

                    <!-- Sin movimientos -->
                    <div class="card-body text-center py-5"
                         th:if="${#lists.isEmpty(historial)}">
                        <i class="fa-solid fa-receipt fa-3x text-muted mb-3 d-block"></i>
                        <p class="text-muted mb-0">
                            Aún no tienes movimientos registrados.
                        </p>
                    </div>

                    <!-- Tabla -->
                    <div class="table-responsive"
                         th:unless="${#lists.isEmpty(historial)}">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Tipo</th>
                                    <th>Descripción</th>
                                    <th>Monto</th>
                                    <th>Estado</th>
                                    <th>Fecha</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="tx : ${historial}">
                                    <td>
                                        <!-- Ícono por tipo -->
                                        <span th:switch="${tx.tipo.name()}">
                                            <span th:case="'DEPOSITO'"
                                                  class="badge bg-success">
                                                <i class="fa-solid fa-arrow-down me-1"></i>
                                                Depósito
                                            </span>
                                            <span th:case="'RETIRO'"
                                                  class="badge bg-danger">
                                                <i class="fa-solid fa-arrow-up me-1"></i>
                                                Retiro
                                            </span>
                                            <span th:case="'PAGO'"
                                                  class="badge bg-primary">
                                                <i class="fa-solid fa-handshake me-1"></i>
                                                Pago
                                            </span>
                                            <span th:case="'ESCROW_BLOQUEO'"
                                                  class="badge bg-warning text-dark">
                                                <i class="fa-solid fa-lock me-1"></i>
                                                Bloqueado
                                            </span>
                                            <span th:case="'ESCROW_LIBERACION'"
                                                  class="badge bg-info">
                                                <i class="fa-solid fa-lock-open me-1"></i>
                                                Liberado
                                            </span>
                                            <span th:case="'COMISION'"
                                                  class="badge bg-secondary">
                                                <i class="fa-solid fa-percent me-1"></i>
                                                Comisión
                                            </span>
                                            <span th:case="*"
                                                  class="badge bg-light text-dark"
                                                  th:text="${tx.tipo}">
                                            </span>
                                        </span>
                                    </td>
                                    <td class="text-muted small"
                                        th:text="${tx.descripcion}">
                                    </td>
                                    <td>
                                        <!-- Verde si es ingreso, rojo si es egreso -->
                                        <span th:classappend="
                                            ${tx.tipo.name() == 'DEPOSITO' or
                                              tx.tipo.name() == 'ESCROW_LIBERACION'}
                                            ? 'text-success fw-bold'
                                            : 'text-danger fw-bold'"
                                              th:text="'Q' + ${#numbers.formatDecimal(tx.monto, 1, 2)}">
                                        </span>
                                    </td>
                                    <td>
                                        <span class="badge"
                                              th:classappend="${tx.estado.name() == 'COMPLETADA'} ? 'bg-success' :
                                                              (${tx.estado.name() == 'PENDIENTE'} ? 'bg-warning text-dark' : 'bg-danger')"
                                              th:text="${tx.estado}">
                                        </span>
                                    </td>
                                    <td class="text-muted small"
                                        th:text="${#temporals.format(tx.fecha, 'dd/MM/yyyy HH:mm')}">
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
