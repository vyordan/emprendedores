<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Billetera - Chamba</title>
</head>
<body>

<div th:replace="~{layout/base :: navbar}"></div>
<hr/>

<div th:if="${exito != null}">
    <p style="color:green;" th:text="${exito}"></p>
</div>
<div th:if="${error != null}">
    <p style="color:red;" th:text="${error}"></p>
</div>

<main>
    <h2>Mi billetera</h2>
    <h3>Saldo:
        <strong th:text="'Q' + ${#numbers.formatDecimal(billetera.saldo,1,2)}">
        </strong>
    </h3>

    <h3>Depositar</h3>
    <form th:action="@{/billetera/depositar}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>
        <label>Monto (Q):
            <input type="number" name="monto" step="0.01" min="1" required/>
        </label>
        <button type="submit">Depositar</button>
    </form>

    <h3>Retirar</h3>
    <form th:action="@{/billetera/retirar}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>
        <label>Monto (Q):
            <input type="number" name="monto" step="0.01" min="1"
                   th:max="${billetera.saldo}" required/>
        </label>
        <button type="submit">Retirar</button>
    </form>

    <hr/>
    <h3>Historial</h3>
    <p th:if="${#lists.isEmpty(historial)}">Sin movimientos.</p>
    <table th:unless="${#lists.isEmpty(historial)}" border="1" cellpadding="6">
        <thead>
            <tr>
                <th>Tipo</th><th>Descripción</th>
                <th>Monto</th><th>Estado</th><th>Fecha</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="tx : ${historial}">
                <td th:text="${tx.tipo}"></td>
                <td th:text="${tx.descripcion}"></td>
                <td th:text="'Q' + ${#numbers.formatDecimal(tx.monto,1,2)}"></td>
                <td th:text="${tx.estado}"></td>
                <td th:text="${#temporals.format(tx.fecha,'dd/MM/yyyy HH:mm')}"></td>
            </tr>
        </tbody>
    </table>
</main>

<footer><p>xd &copy; 2026</p></footer>
</body>
</html>
